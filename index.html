<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Tool Hub - 优质AI工具导航</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🤖</text></svg>">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <meta name="description" content="AI Tool Hub - 一站式优质AI工具导航平台，涵盖写作、绘画、代码、视频、语音、设计、办公等领域">
    <meta name="keywords" content="AI工具,AI导航,人工智能工具,AI写作,AI绘画,AI代码,AI视频,AI语音,AI设计,AI办公">
    <meta name="theme-color" content="#6366f1">
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #a855f7;
            --background: #0a0a0f;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text: #ffffff;
            --text-secondary: #9ca3af;
            --accent: #06b6d4;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--background);
            color: var(--text);
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Header */
        header {
            padding: 20px 0;
            border-bottom: 1px solid var(--glass-border);
            position: sticky;
            top: 0;
            background: rgba(10, 10, 15, 0.8);
            backdrop-filter: blur(10px);
            z-index: 100;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-text {
            font-size: 24px;
            font-weight: bold;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-actions {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        /* Search */
        .search-container {
            position: relative;
            margin: 30px 0;
        }

        .search-box {
            position: relative;
        }

        #mainSearch {
            width: 100%;
            padding: 15px 50px 15px 20px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 25px;
            color: var(--text);
            font-size: 16px;
            backdrop-filter: blur(10px);
        }

        #mainSearch::placeholder {
            color: var(--text-secondary);
        }

        #mainSearch:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.3);
        }

        /* Focus styles for accessibility */
        *:focus {
            outline: 2px solid var(--primary);
            outline-offset: 2px;
        }

        /* Skip link for keyboard users */
        .skip-link {
            position: absolute;
            top: -40px;
            left: 0;
            background: var(--primary);
            color: white;
            padding: 8px;
            z-index: 1000;
            text-decoration: none;
            transition: top 0.3s;
        }

        .skip-link:focus {
            top: 0;
        }

        /* Screen reader only */
        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }

        #clearSearchBtn {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
        }

        .search-history {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            margin-top: 10px;
            backdrop-filter: blur(10px);
            max-height: 200px;
            overflow-y: auto;
            z-index: 50;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .search-history.show {
            opacity: 1;
            visibility: visible;
        }

        /* Categories */
        .categories {
            margin: 30px 0;
            overflow-x: auto;
            padding-bottom: 10px;
        }

        #categoryFilter {
            display: flex;
            gap: 10px;
        }

        .category-btn {
            padding: 8px 20px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 25px;
            color: var(--text);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            white-space: nowrap;
            transform-origin: center;
        }

        .category-btn:hover {
            background: rgba(99, 102, 241, 0.2);
            border-color: var(--primary);
            transform: translateY(-2px) scale(1.05);
            box-shadow: 0 5px 15px rgba(99, 102, 241, 0.3);
        }

        .category-btn.active {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-color: var(--primary);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(99, 102, 241, 0.4);
        }

        /* Tools Grid */
        #toolsGrid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin: 30px 0;
        }

        .glass-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 20px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(10px);
        }

        .glass-card:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 15px 35px rgba(99, 102, 241, 0.3);
            border-color: var(--primary);
        }

        .glass-card h3 {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .glass-card p {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 12px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .tag-new {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
        }

        .tag-stable {
            background: rgba(34, 197, 94, 0.2);
            color: #22c55e;
        }

        .tag-recommended {
            background: rgba(245, 158, 11, 0.2);
            color: #f59e0b;
        }

        /* Bottom Navigation */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(10, 10, 15, 0.8);
            backdrop-filter: blur(10px);
            border-top: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
            z-index: 90;
        }

        .bottom-nav a,
        .bottom-nav button {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 8px;
            color: var(--text-secondary);
            text-decoration: none;
            background: none;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .bottom-nav a:hover,
        .bottom-nav button:hover {
            color: var(--primary);
        }

        .bottom-nav a.active,
        .bottom-nav button.active {
            color: var(--primary);
        }

        /* Modal */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 200;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .modal.active {
            opacity: 1;
            visibility: visible;
        }

        .modal-content {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 30px;
            max-width: 400px;
            width: 90%;
            backdrop-filter: blur(10px);
            transform: scale(0.9) translateY(20px);
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .modal.active .modal-content {
            transform: scale(1) translateY(0);
            opacity: 1;
        }

        /* Toast */
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            padding: 15px 20px;
            backdrop-filter: blur(10px);
            z-index: 300;
            opacity: 0;
            visibility: hidden;
            transform: translateX(100%) translateY(-20px);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .toast.show {
            opacity: 1;
            visibility: visible;
            transform: translateX(0) translateY(0);
        }

        /* Loading */
        .loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 50px 0;
        }

        .loading-text {
            margin-bottom: 20px;
            color: var(--text-secondary);
            font-size: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .loading-spinner {
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .skeleton {
            background: linear-gradient(90deg, var(--glass-bg) 25%, rgba(255, 255, 255, 0.1) 50%, var(--glass-bg) 75%);
            background-size: 200% 100%;
            animation: skeleton-loading 1.5s ease-in-out infinite;
            border-radius: 8px;
        }

        @keyframes skeleton-loading {
            0% {
                background-position: 200% 0;
            }
            100% {
                background-position: -200% 0;
            }
        }

        /* Utility: Hidden */
        .hidden {
            display: none !important;
        }

        /* Pull to Refresh */
        #pullRefresh {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(10, 10, 15, 0.8);
            backdrop-filter: blur(10px);
            transform: translateY(-100%);
            transition: transform 0.3s ease;
            z-index: 50;
        }

        #pullRefresh.visible {
            transform: translateY(0);
        }

        /* Announcement */
        #announcementBar {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            padding: 10px;
            text-align: center;
            position: sticky;
            top: 70px;
            z-index: 95;
            display: none;
        }

        /* Responsive */
        @media (max-width: 768px) {
            #toolsGrid {
                grid-template-columns: 1fr;
                gap: 15px;
            }

            .header-actions {
                gap: 5px;
            }

            .logo-text {
                font-size: 20px;
            }

            .search-container {
                margin: 20px 0;
            }

            #mainSearch {
                padding: 12px 45px 12px 16px;
                font-size: 14px;
            }

            .categories {
                margin: 20px 0;
            }

            #categoryFilter {
                gap: 8px;
            }

            .category-btn {
                padding: 6px 16px;
                font-size: 13px;
            }

            .glass-card {
                padding: 16px;
            }

            .glass-card h3 {
                font-size: 16px;
            }

            .glass-card p {
                font-size: 13px;
            }

            .modal-content {
                padding: 20px;
                max-width: 90%;
            }

            #announcementBar {
                top: 60px;
            }

            .loading {
                padding: 40px 0;
            }
        }

        @media (max-width: 480px) {
            .logo-text {
                font-size: 18px;
            }

            .header-actions button {
                padding: 8px;
            }

            #mainSearch {
                padding: 10px 40px 10px 14px;
                font-size: 13px;
            }

            .category-btn {
                padding: 5px 14px;
                font-size: 12px;
            }

            .glass-card {
                padding: 14px;
            }

            .glass-card h3 {
                font-size: 15px;
            }

            .glass-card p {
                font-size: 12px;
            }

            .bottom-nav {
                padding: 8px 0;
            }

            .bottom-nav a,
            .bottom-nav button {
                padding: 6px;
            }

            .bottom-nav span {
                font-size: 10px;
            }
        }

        /* Gradient Text */
        .gradient-text {
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 50%, #06b6d4 100%);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body>
    <!-- Skip link for keyboard users -->
    <a href="#mainSearch" class="skip-link">跳过导航，直接搜索</a>
    
    <!-- Pull to Refresh Indicator -->
    <div id="pullRefresh">
        <i class="fas fa-sync-alt fa-spin mr-2"></i> 刷新中...
    </div>

    <!-- Announcement Bar -->
    <div id="announcementBar" class="announcement-bar">
        <div class="container flex items-center justify-between">
            <span id="announcementText">🎉 AI Tool Hub v2.5 全新上线，新增30+工具！</span>
            <button onclick="closeAnnouncement()" class="ml-4 text-white"><i class="fas fa-times"></i></button>
        </div>
    </div>

    <!-- Header -->
    <header>
        <div class="container header-content">
            <div class="logo">
                <span class="text-2xl">🤖</span>
                <div class="logo-text">AI Tool Hub</div>
            </div>
            <div class="header-actions">
                <button onclick="showShareModal()" class="p-2 rounded-full hover:bg-primary/20 transition-all">
                    <i class="fas fa-share-alt"></i>
                </button>
                <button onclick="toggleTheme()" class="p-2 rounded-full hover:bg-primary/20 transition-all">
                    <i id="themeIcon" class="fas fa-moon text-primary"></i>
                </button>
            </div>
        </div>
    </header>

    <main>
        <div class="container">
            <!-- Search -->
            <div class="search-container" role="search">
                <div class="search-box">
                    <input type="text" id="mainSearch" placeholder="搜索AI工具..." autocomplete="off" aria-label="搜索AI工具" aria-describedby="search-description">
                    <span id="search-description" class="sr-only">输入工具名称或描述进行搜索</span>
                    <button id="clearSearchBtn" class="hidden" aria-label="清除搜索" aria-describedby="clear-search-description">
                        <i class="fas fa-times" aria-hidden="true"></i>
                    </button>
                    <span id="clear-search-description" class="sr-only">清除搜索框中的内容</span>
                </div>
                <div class="search-history" id="searchHistory" role="listbox" aria-label="搜索历史"></div>
            </div>

            <!-- Categories -->
            <div class="categories">
                <div id="categoryFilter"></div>
            </div>

            <!-- Loading State -->
            <div id="loadingState" class="loading">
                <div class="loading-text">
                    <i class="fas fa-spinner fa-spin loading-spinner"></i>
                    <span>加载中...</span>
                </div>
                <div class="flex flex-wrap gap-4">
                    <div class="glass-card rounded-2xl p-5">
                        <div class="skeleton h-24 rounded-xl mb-4"></div>
                        <div class="skeleton h-4 w-3/4 rounded mb-2"></div>
                        <div class="skeleton h-3 w-full rounded"></div>
                    </div>
                    <div class="glass-card rounded-2xl p-5">
                        <div class="skeleton h-24 rounded-xl mb-4"></div>
                        <div class="skeleton h-4 w-3/4 rounded mb-2"></div>
                        <div class="skeleton h-3 w-full rounded"></div>
                    </div>
                    <div class="glass-card rounded-2xl p-5">
                        <div class="skeleton h-24 rounded-xl mb-4"></div>
                        <div class="skeleton h-4 w-3/4 rounded mb-2"></div>
                        <div class="skeleton h-3 w-full rounded"></div>
                    </div>
                    <div class="glass-card rounded-2xl p-5">
                        <div class="skeleton h-24 rounded-xl mb-4"></div>
                        <div class="skeleton h-4 w-3/4 rounded mb-2"></div>
                        <div class="skeleton h-3 w-full rounded"></div>
                    </div>
                </div>
            </div>

            <!-- Tools Grid -->
            <div id="toolsGrid" class="tools-grid"></div>
        </div>
    </main>

    <!-- Bottom Navigation (Mobile) -->
    <nav class="bottom-nav justify-around" id="bottomNav" role="navigation" aria-label="底部导航">
        <a href="#home" class="flex flex-col items-center gap-1 p-2 text-primary" aria-label="首页" tabindex="0">
            <i class="fas fa-home" aria-hidden="true"></i>
            <span class="text-xs">首页</span>
        </a>
        <a href="#tools" class="flex flex-col items-center gap-1 p-2 text-gray-500" aria-label="工具" tabindex="0">
            <i class="fas fa-th-large" aria-hidden="true"></i>
            <span class="text-xs">工具</span>
        </a>
        <button onclick="showShareModal()" class="flex flex-col items-center gap-1 p-2 text-gray-500" aria-label="分享" tabindex="0">
            <i class="fas fa-share-alt" aria-hidden="true"></i>
            <span class="text-xs">分享</span>
        </button>
        <button onclick="toggleTheme()" class="flex flex-col items-center gap-1 p-2 text-gray-500" aria-label="切换主题" tabindex="0">
            <i class="fas fa-moon" aria-hidden="true"></i>
            <span class="text-xs">主题</span>
        </button>
    </nav>

    <!-- Share Modal -->
    <div id="shareModal" class="modal" onclick="closeShareModal(event)" role="dialog" aria-modal="true" aria-labelledby="share-modal-title" aria-describedby="share-modal-description">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h3 id="share-modal-title" class="text-xl font-bold mb-4">分享 AI Tool Hub</h3>
            <p id="share-modal-description" class="sr-only">选择分享方式</p>
            <div class="flex flex-col gap-3" role="list" aria-label="分享选项">
                <button onclick="shareToWeChat()" class="flex items-center gap-3 p-3 rounded-lg glass hover:bg-primary/20 transition-all" role="listitem" aria-label="分享到微信" tabindex="0">
                    <i class="fab fa-weixin text-xl" aria-hidden="true"></i>
                    <span>微信</span>
                </button>
                <button onclick="shareToQQ()" class="flex items-center gap-3 p-3 rounded-lg glass hover:bg-primary/20 transition-all" role="listitem" aria-label="分享到QQ" tabindex="0">
                    <i class="fab fa-qq text-xl" aria-hidden="true"></i>
                    <span>QQ</span>
                </button>
                <button onclick="copyShareLink()" class="flex items-center gap-3 p-3 rounded-lg glass hover:bg-primary/20 transition-all" role="listitem" aria-label="复制链接" tabindex="0">
                    <i class="fas fa-link text-xl" aria-hidden="true"></i>
                    <span>复制链接</span>
                </button>
                <button onclick="generateShareImage()" class="flex items-center gap-3 p-3 rounded-lg glass hover:bg-primary/20 transition-all" role="listitem" aria-label="生成分享图片" tabindex="0">
                    <i class="fas fa-image text-xl" aria-hidden="true"></i>
                    <span>生成分享图片</span>
                </button>
            </div>
        </div>
    </div>

    <!-- Update Modal -->
    <div id="updateModal" class="modal" onclick="closeUpdateModal()" role="dialog" aria-modal="true" aria-labelledby="update-modal-title" aria-describedby="update-modal-description">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h3 id="update-modal-title" class="text-xl font-bold mb-4">🎉 版本更新</h3>
            <div id="update-modal-description" class="mb-4">
                <p class="mb-2">AI Tool Hub v2.5 全新上线！</p>
                <ul class="text-sm text-gray-400 space-y-1">
                    <li>• 新增30+优质AI工具</li>
                    <li>• 优化搜索体验</li>
                    <li>• 支持主题切换</li>
                    <li>• 性能提升</li>
                </ul>
            </div>
            <button onclick="closeUpdateModal()" class="w-full py-2 bg-gradient-to-r from-primary to-secondary text-white rounded-lg hover:shadow-lg transition-all" aria-label="关闭更新提示" tabindex="0">
                了解更多
            </button>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast">
        <span id="toastMsg"></span>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <script type="module" src="js/main.js"></script>
</body>
</html>
