<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Tool Hub - 优质AI工具导航</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🤖</text></svg>">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <meta name="description" content="AI Tool Hub - 一站式优质AI工具导航平台，涵盖写作、绘画、代码、视频、语音、设计、办公等领域">
    <meta name="keywords" content="AI工具,AI导航,人工智能工具,AI写作,AI绘画,AI代码,AI视频,AI语音,AI设计,AI办公">
    <meta name="theme-color" content="#6366f1">
    <style>
        /* ============================================
           🎨 MODERN UI DESIGN SYSTEM (v4.0)
           6 Themes: Default, Midnight, Lavender, Ocean, Sakura, Forest, Sunset
           ============================================ */

        :root {
            /* Primary Colors */
            --primary: #6366f1;
            --primary-light: #818cf8;
            --primary-dark: #4f46e5;
            
            /* Accent Colors */
            --accent-pink: #ec4899;
            --accent-cyan: #06b6d4;
            --accent-green: #10b981;
            --accent-orange: #f59e0b;
            --accent-red: #ef4444;

            /* Background Gradient */
            --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            --bg-subtle: linear-gradient(to bottom right, #f5f7fa, #e4e8eb);
            --body-bg: #f8fafc;
            
            /* Card System */
            --card-bg: rgba(255, 255, 255, 0.95);
            --card-border: rgba(99, 102, 241, 0.08);
            --card-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 
                          0 10px 15px -3px rgba(0, 0, 0, 0.05);
            --card-shadow-hover: 0 20px 25px -5px rgba(99, 102, 241, 0.15),
                                   0 10px 10px -5px rgba(99, 102, 241, 0.04);

            /* Text Colors */
            --text-primary: #1f2937;
            --text-secondary: #6b7280;
            --text-muted: #9ca3af;

            /* Header */
            --header-bg: rgba(255, 255, 255, 0.85);
            --header-border: rgba(99, 102, 241, 0.08);

            /* Spacing */
            --radius-sm: 12px;
            --radius-md: 16px;
            --radius-lg: 20px;
            --radius-xl: 24px;
            --radius-full: 9999px;

            /* Theme Transition */
            --theme-transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* ============================================
           🌙 THEME 1: Midnight Dark (深色模式)
           ============================================ */
        
        [data-theme="midnight"] {
            --primary: #818cf8;
            --primary-light: #a5b4fc;
            --primary-dark: #6366f1;
            
            --accent-pink: #f472b6;
            --accent-cyan: #22d3ee;
            --accent-green: #34d399;
            --accent-orange: #fbbf24;
            --accent-red: #f87171;

            --bg-gradient: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            --bg-subtle: linear-gradient(to bottom right, #0f172a, #1e293b);
            --body-bg: #0f172a;
            
            --card-bg: rgba(30, 41, 59, 0.95);
            --card-border: rgba(148, 163, 184, 0.1);
            --card-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3), 
                          0 10px 15px -3px rgba(0, 0, 0, 0.2);
            --card-shadow-hover: 0 20px 25px -5px rgba(99, 102, 241, 0.25),
                                   0 10px 10px -5px rgba(99, 102, 241, 0.1);

            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;

            --header-bg: rgba(15, 23, 42, 0.85);
            --header-border: rgba(148, 163, 184, 0.1);
        }

        [data-theme="midnight"] body::before {
            background: 
                radial-gradient(circle at 20% 30%, rgba(129, 140, 248, 0.12) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(244, 114, 182, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 40% 90%, rgba(34, 211, 238, 0.06) 0%, transparent 50%);
        }

        [data-theme="midnight"] .search-box,
        [data-theme="midnight"] .tool-card,
        [data-theme="midnight"] .bottom-nav,
        [data-theme="midnight"] .modal-content,
        [data-theme="midnight"] .toast,
        [data-theme="midnight"] .skeleton-card {
            background: var(--card-bg) !important;
            border-color: var(--card-border) !important;
        }

        [data-theme="midnight"] header {
            background: var(--header-bg) !important;
            border-bottom-color: var(--header-border) !important;
        }

        [data-theme="midnight"] .category-btn {
            background: rgba(30, 41, 59, 0.8) !important;
            border-color: rgba(148, 163, 184, 0.15) !important;
            color: #cbd5e1 !important;
        }

        [data-theme="midnight"] .category-btn:hover {
            background: rgba(99, 102, 241, 0.15) !important;
            border-color: var(--primary) !important;
            color: var(--primary) !important;
        }

        [data-theme="midnight"] .modal-option {
            background: rgba(30, 41, 59, 0.8) !important;
            border-color: rgba(148, 163, 184, 0.15) !important;
            color: #e2e8f0 !important;
        }

        /* ============================================
           💜 THEME 2: Lavender Dream (薰衣草紫)
           ============================================ */

        [data-theme="lavender"] {
            --primary: #a78bfa;
            --primary-light: #c4b5fd;
            --primary-dark: #8b5cf6;
            
            --accent-pink: #f472b6;
            --accent-cyan: #67e8f9;
            --accent-green: #6ee7b7;
            --accent-orange: #fcd34d;
            --accent-red: #fca5a5;

            --bg-gradient: linear-gradient(135deg, #ede9fe 0%, #ddd6fe 50%, #fce7f3 100%);
            --bg-subtle: linear-gradient(to bottom right, #faf5ff, #fdf4ff);
            --body-bg: #faf5ff;
            
            --card-bg: rgba(255, 255, 255, 0.98);
            --card-border: rgba(167, 139, 250, 0.15);
            --card-shadow: 0 4px 6px -1px rgba(167, 139, 250, 0.08), 
                          0 10px 15px -3px rgba(167, 139, 250, 0.05);
            --card-shadow-hover: 0 20px 25px -5px rgba(167, 139, 250, 0.2),
                                   0 10px 10px -5px rgba(167, 139, 250, 0.08);

            --text-primary: #581c87;
            --text-secondary: #7c3aed;
            --text-muted: #a78bfa;

            --header-bg: rgba(250, 245, 255, 0.9);
            --header-border: rgba(167, 139, 250, 0.15);
        }

        [data-theme="lavender"] body::before {
            background: 
                radial-gradient(circle at 20% 30%, rgba(167, 139, 250, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(244, 114, 182, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 40% 90%, rgba(103, 232, 249, 0.08) 0%, transparent 50%);
        }

        /* ============================================
           🌊 THEME 3: Ocean Breeze (海洋蓝)
           ============================================ */

        [data-theme="ocean"] {
            --primary: #0ea5e9;
            --primary-light: #38bdf8;
            --primary-dark: #0284c7;
            
            --accent-pink: #f472b6;
            --accent-cyan: #22d3ee;
            --accent-green: #2dd4bf;
            --accent-orange: #fbbf24;
            --accent-red: #f87171;

            --bg-gradient: linear-gradient(135deg, #cffafe 0%, #e0f2fe 50%, #dbeafe 100%);
            --bg-subtle: linear-gradient(to bottom right, #ecfeff, #f0f9ff);
            --body-bg: #ecfeff;
            
            --card-bg: rgba(255, 255, 255, 0.98);
            --card-border: rgba(14, 165, 233, 0.12);
            --card-shadow: 0 4px 6px -1px rgba(14, 165, 233, 0.08), 
                          0 10px 15px -3px rgba(14, 165, 233, 0.05);
            --card-shadow-hover: 0 20px 25px -5px rgba(14, 165, 233, 0.18),
                                   0 10px 10px -5px rgba(14, 165, 233, 0.06);

            --text-primary: #0c4a6e;
            --text-secondary: #0369a1;
            --text-muted: #0ea5e9;

            --header-bg: rgba(236, 254, 255, 0.9);
            --header-border: rgba(14, 165, 233, 0.12);
        }

        [data-theme="ocean"] body::before {
            background: 
                radial-gradient(circle at 20% 30%, rgba(14, 165, 233, 0.12) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(34, 211, 238, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 40% 90%, rgba(45, 212, 191, 0.08) 0%, transparent 50%);
        }

        /* ============================================
           🌸 THEME 4: Sakura Pink (樱花粉)
           ============================================ */

        [data-theme="sakura"] {
            --primary: #ec4899;
            --primary-light: #f472b6;
            --primary-dark: #db2777;
            
            --accent-pink: #f9a8d4;
            --accent-cyan: #67e8f9;
            --accent-green: #6ee7b7;
            --accent-orange: #fcd34d;
            --accent-red: #fb7185;

            --bg-gradient: linear-gradient(135deg, #fce7f3 0%, #fbcfe8 50%, #fef3c7 100%);
            --bg-subtle: linear-gradient(to bottom right, #fff1f2, #fff7ed);
            --body-bg: #fff1f2;
            
            --card-bg: rgba(255, 255, 255, 0.98);
            --card-border: rgba(236, 72, 153, 0.12);
            --card-shadow: 0 4px 6px -1px rgba(236, 72, 153, 0.08), 
                          0 10px 15px -3px rgba(236, 72, 153, 0.05);
            --card-shadow-hover: 0 20px 25px -5px rgba(236, 72, 153, 0.18),
                                   0 10px 10px -5px rgba(236, 72, 153, 0.06);

            --text-primary: #831843;
            --text-secondary: #be185d;
            --text-muted: #ec4899;

            --header-bg: rgba(255, 241, 242, 0.9);
            --header-border: rgba(236, 72, 153, 0.12);
        }

        [data-theme="sakura"] body::before {
            background: 
                radial-gradient(circle at 20% 30%, rgba(236, 72, 153, 0.12) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(249, 168, 212, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 40% 90%, rgba(251, 113, 133, 0.08) 0%, transparent 50%);
        }

        /* ============================================
           🍃 THEME 5: Forest Green (森林绿)
           ============================================ */

        [data-theme="forest"] {
            --primary: #059669;
            --primary-light: #34d399;
            --primary-dark: #047857;
            
            --accent-pink: #f472b6;
            --accent-cyan: #22d3ee;
            --accent-green: #86efac;
            --accent-orange: #fbbf24;
            --accent-red: #f87171;

            --bg-gradient: linear-gradient(135deg, #d1fae5 0%, #a7f3d0 50%, #ecfccb 100%);
            --bg-subtle: linear-gradient(to bottom right, #ecfdf5, #f0fdf4);
            --body-bg: #ecfdf5;
            
            --card-bg: rgba(255, 255, 255, 0.98);
            --card-border: rgba(5, 150, 105, 0.12);
            --card-shadow: 0 4px 6px -1px rgba(5, 150, 105, 0.08), 
                          0 10px 15px -3px rgba(5, 150, 105, 0.05);
            --card-shadow-hover: 0 20px 25px -5px rgba(5, 150, 105, 0.18),
                                   0 10px 10px -5px rgba(5, 150, 105, 0.06);

            --text-primary: #064e3b;
            --text-secondary: #047857;
            --text-muted: #059669;

            --header-bg: rgba(236, 253, 245, 0.9);
            --header-border: rgba(5, 150, 105, 0.12);
        }

        [data-theme="forest"] body::before {
            background: 
                radial-gradient(circle at 20% 30%, rgba(5, 150, 105, 0.12) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(52, 211, 153, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 40% 90%, rgba(134, 239, 172, 0.08) 0%, transparent 50%);
        }

        /* ============================================
           🔥 THEME 6: Sunset Orange (日落橙)
           ============================================ */

        [data-theme="sunset"] {
            --primary: #ea580c;
            --primary-light: #fb923c;
            --primary-dark: #c2410c;
            
            --accent-pink: #f472b6;
            --accent-cyan: #22d3ee;
            --accent-green: #6ee7b7;
            --accent-orange: #fdba74;
            --accent-red: #fca5a5;

            --bg-gradient: linear-gradient(135deg, #ffedd5 0%, #fed7aa 50%, #fef3c7 100%);
            --bg-subtle: linear-gradient(to bottom right, #fff7ed, #fffbeb);
            --body-bg: #fff7ed;
            
            --card-bg: rgba(255, 255, 255, 0.98);
            --card-border: rgba(234, 88, 12, 0.12);
            --card-shadow: 0 4px 6px -1px rgba(234, 88, 12, 0.08), 
                          0 10px 15px -3px rgba(234, 88, 12, 0.05);
            --card-shadow-hover: 0 20px 25px -5px rgba(234, 88, 12, 0.18),
                                   0 10px 10px -5px rgba(234, 88, 12, 0.06);

            --text-primary: #7c2d12;
            --text-secondary: #c2410c;
            --text-muted: #ea580c;

            --header-bg: rgba(255, 247, 237, 0.9);
            --header-border: rgba(234, 88, 12, 0.12);
        }

        [data-theme="sunset"] body::before {
            background: 
                radial-gradient(circle at 20% 30%, rgba(234, 88, 12, 0.12) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(251, 146, 60, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 40% 90%, rgba(253, 186, 116, 0.08) 0%, transparent 50%);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', Roboto, sans-serif;
            background: var(--body-bg);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
            overflow-x: hidden;
            transition: var(--theme-transition);
        }

        /* Background Pattern */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 30%, rgba(99, 102, 241, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(236, 72, 153, 0.06) 0%, transparent 50%),
                radial-gradient(circle at 40% 90%, rgba(6, 182, 212, 0.05) 0%, transparent 50%);
            pointer-events: none;
            z-index: -1;
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 24px;
        }

        /* ============================================
           HEADER - Modern Glass Effect
           ============================================ */
        
        header {
            padding: 16px 0;
            position: sticky;
            top: 0;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px) saturate(180%);
            border-bottom: 1px solid rgba(99, 102, 241, 0.08);
            z-index: 100;
            transition: all 0.3s ease;
        }

        header.scrolled {
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
        }

        .logo-icon {
            width: 42px;
            height: 42px;
            background: linear-gradient(135deg, var(--primary), var(--accent-pink));
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
            transition: transform 0.3s ease;
        }

        .logo:hover .logo-icon {
            transform: rotate(-5deg) scale(1.05);
        }

        .logo-text {
            font-size: 22px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), var(--accent-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.5px;
        }

        .header-actions {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .header-btn {
            width: 40px;
            height: 40px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--card-border);
            background: white;
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            position: relative;
        }

        .header-btn:hover {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }

        .header-btn:active {
            transform: translateY(0);
        }

        /* ============================================
           HERO SECTION
           ============================================ */

        .hero {
            text-align: center;
            padding: 60px 0 40px;
        }

        .hero-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.1), rgba(236, 72, 153, 0.1));
            border: 1px solid rgba(99, 102, 241, 0.2);
            border-radius: var(--radius-full);
            font-size: 13px;
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 20px;
            animation: fadeInDown 0.6s ease;
        }

        .hero-title {
            font-size: clamp(32px, 6vw, 56px);
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 16px;
            letter-spacing: -1.5px;
            animation: fadeInUp 0.6s ease 0.1s both;
        }

        .hero-title span {
            background: linear-gradient(135deg, var(--primary), var(--accent-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero-subtitle {
            font-size: 18px;
            color: var(--text-secondary);
            max-width: 600px;
            margin: 0 auto 32px;
            animation: fadeInUp 0.6s ease 0.2s both;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ============================================
           SEARCH - Modern Pill Design
           ============================================ */

        .search-container {
            position: relative;
            max-width: 640px;
            margin: 0 auto 32px;
            animation: fadeInUp 0.6s ease 0.3s both;
        }

        .search-box {
            position: relative;
            background: white;
            border-radius: var(--radius-full);
            box-shadow: var(--card-shadow);
            border: 2px solid transparent;
            transition: all 0.3s ease;
        }

        .search-box:focus-within {
            border-color: var(--primary);
            box-shadow: var(--card-shadow-hover), 0 0 0 4px rgba(99, 102, 241, 0.1);
        }

        #mainSearch {
            width: 100%;
            padding: 18px 60px 18px 24px;
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-size: 16px;
            font-weight: 500;
        }

        #mainSearch::placeholder {
            color: var(--text-muted);
            font-weight: 400;
        }

        #mainSearch:focus {
            outline: none;
        }

        .search-icon {
            position: absolute;
            left: 24px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            pointer-events: none;
        }

        #clearSearchBtn {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: var(--text-muted);
            color: white;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            font-size: 12px;
        }

        #clearSearchBtn:hover {
            background: var(--text-secondary);
            transform: translateY(-50%) scale(1.1);
        }

        .search-history {
            position: absolute;
            top: calc(100% + 8px);
            left: 0;
            right: 0;
            background: white;
            border-radius: var(--radius-lg);
            box-shadow: var(--card-shadow-hover);
            padding: 12px;
            max-height: 280px;
            overflow-y: auto;
            z-index: 50;
            opacity: 0;
            visibility: hidden;
            transform: translateY(-10px);
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .search-history.show {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        .search-history-item {
            padding: 12px 16px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.2s ease;
            color: var(--text-primary);
        }

        .search-history-item:hover {
            background: rgba(99, 102, 241, 0.05);
            color: var(--primary);
        }

        /* Focus styles for accessibility */
        *:focus-visible {
            outline: 2px solid var(--primary);
            outline-offset: 2px;
        }

        /* Skip link for keyboard users */
        .skip-link {
            position: absolute;
            top: -40px;
            left: 0;
            background: var(--primary);
            color: white;
            padding: 10px 16px;
            z-index: 1000;
            text-decoration: none;
            border-radius: 0 0 var(--radius-sm) 0;
            transition: top 0.3s ease;
            font-weight: 500;
        }

        .skip-link:focus {
            top: 0;
        }

        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }

        /* ============================================
           CATEGORIES - Chip/Pill Style
           ============================================ */

        .categories {
            margin-bottom: 32px;
            animation: fadeInUp 0.6s ease 0.4s both;
        }

        #categoryFilter {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .category-btn {
            padding: 10px 22px;
            background: white;
            border: 1.5px solid var(--card-border);
            border-radius: var(--radius-full);
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            white-space: nowrap;
            position: relative;
            overflow: hidden;
        }

        .category-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, var(--primary), var(--accent-pink));
            opacity: 0;
            transition: opacity 0.25s ease;
            z-index: -1;
        }

        .category-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.15);
        }

        .category-btn.active {
            background: linear-gradient(135deg, var(--primary), var(--accent-pink));
            border-color: transparent;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.35);
        }

        .category-btn.active:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(99, 102, 241, 0.4);
        }

        /* ============================================
           TOOLS GRID - Modern Card Layout
           ============================================ */

        #toolsGrid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 24px;
            margin-bottom: 100px;
        }

        .tool-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: var(--radius-lg);
            padding: 24px;
            cursor: pointer;
            transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            animation: cardFadeIn 0.5s ease both;
        }

        .tool-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, var(--primary), var(--accent-pink));
            opacity: 0;
            transition: opacity 0.35s ease;
        }

        .tool-card:hover {
            transform: translateY(-8px);
            box-shadow: var(--card-shadow-hover);
            border-color: rgba(99, 102, 241, 0.2);
        }

        .tool-card:hover::before {
            opacity: 1;
        }

        @keyframes cardFadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 16px;
        }

        .card-icon {
            width: 52px;
            height: 52px;
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.1), rgba(236, 72, 153, 0.1));
            color: var(--primary);
            transition: transform 0.3s ease;
        }

        .tool-card:hover .card-icon {
            transform: scale(1.1) rotate(-5deg);
        }

        .card-actions {
            display: flex;
            gap: 8px;
        }

        .favorite-btn {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            border: 1.5px solid var(--card-border);
            background: white;
            color: var(--text-muted);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.25s ease;
        }

        .favorite-btn:hover {
            border-color: var(--accent-orange);
            color: var(--accent-orange);
            background: rgba(245, 158, 11, 0.05);
            transform: scale(1.1);
        }

        .favorite-btn.active {
            border-color: var(--accent-orange);
            color: var(--accent-orange);
            background: rgba(245, 158, 11, 0.1);
        }

        .card-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 8px;
            letter-spacing: -0.3px;
        }

        .card-desc {
            font-size: 14px;
            color: var(--text-secondary);
            line-height: 1.5;
            margin-bottom: 16px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .card-tags {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }

        .tag {
            padding: 4px 10px;
            border-radius: var(--radius-full);
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.3px;
        }

        .tag-free {
            background: rgba(16, 185, 129, 0.1);
            color: #059669;
        }

        .tag-vip {
            background: rgba(99, 102, 241, 0.1);
            color: var(--primary-dark);
        }

        .tag-new {
            background: rgba(239, 68, 68, 0.1);
            color: #dc2626;
        }

        .tag-hot {
            background: rgba(245, 158, 11, 0.1);
            color: #d97706;
        }

        .tag-domestic {
            background: rgba(236, 72, 153, 0.1);
            color: #db2777;
        }

        .tag-overseas {
            background: rgba(6, 182, 212, 0.1);
            color: #0891b2;
        }

        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 16px;
            border-top: 1px solid var(--card-border);
        }

        .card-category {
            font-size: 13px;
            color: var(--text-muted);
            font-weight: 500;
        }

        .card-action-btn {
            padding: 9px 20px;
            background: linear-gradient(135deg, var(--primary), var(--accent-pink));
            color: white;
            border: none;
            border-radius: var(--radius-full);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s ease;
            box-shadow: 0 2px 8px rgba(99, 102, 241, 0.25);
        }

        .card-action-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.35);
        }

        .card-action-btn:active {
            transform: translateY(0);
        }

        /* ============================================
           BOTTOM NAVIGATION - Floating Style
           ============================================ */

        .bottom-nav {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            border-radius: var(--radius-xl);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.12);
            padding: 12px 28px;
            display: flex;
            gap: 32px;
            z-index: 90;
            border: 1px solid var(--card-border);
        }

        .bottom-nav a,
        .bottom-nav button {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            color: var(--text-muted);
            text-decoration: none;
            background: none;
            border: none;
            cursor: pointer;
            transition: all 0.25s ease;
            padding: 8px 12px;
            border-radius: var(--radius-sm);
            position: relative;
        }

        .bottom-nav a:hover,
        .bottom-nav button:hover {
            color: var(--primary);
            background: rgba(99, 102, 241, 0.05);
        }

        .bottom-nav a.active,
        .bottom-nav button.active {
            color: var(--primary);
        }

        .bottom-nav a.active::after,
        .bottom-nav button.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 4px;
            height: 4px;
            background: var(--primary);
            border-radius: 50%;
        }

        .nav-icon {
            font-size: 20px;
            transition: transform 0.25s ease;
        }

        .bottom-nav a:hover .nav-icon,
        .bottom-nav button:hover .nav-icon {
            transform: translateY(-2px);
        }

        .nav-label {
            font-size: 11px;
            font-weight: 600;
        }

        /* ============================================
           MODAL - Modern Overlay
           ============================================ */

        .modal {
            position: fixed;
            inset: 0;
            background: rgba(17, 24, 39, 0.6);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 200;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            padding: 20px;
        }

        .modal.active {
            opacity: 1;
            visibility: visible;
        }

        .modal-content {
            background: white;
            border-radius: var(--radius-xl);
            padding: 32px;
            max-width: 420px;
            width: 100%;
            transform: scale(0.95) translateY(20px);
            opacity: 0;
            transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }

        .modal.active .modal-content {
            transform: scale(1) translateY(0);
            opacity: 1;
        }

        .modal-title {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 24px;
            color: var(--text-primary);
        }

        .modal-option {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 16px;
            border-radius: var(--radius-md);
            background: var(--bg-subtle);
            border: 1px solid var(--card-border);
            cursor: pointer;
            transition: all 0.25s ease;
            margin-bottom: 12px;
            font-weight: 500;
            color: var(--text-primary);
        }

        .modal-option:last-child {
            margin-bottom: 0;
        }

        .modal-option:hover {
            background: rgba(99, 102, 241, 0.05);
            border-color: var(--primary);
            transform: translateX(4px);
        }

        .modal-option i {
            width: 40px;
            height: 40px;
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        /* ============================================
           TOAST - Slide In Notification
           ============================================ */

        .toast {
            position: fixed;
            top: 24px;
            right: 24px;
            background: white;
            border-radius: var(--radius-md);
            padding: 16px 24px;
            box-shadow: var(--card-shadow-hover);
            z-index: 300;
            opacity: 0;
            visibility: hidden;
            transform: translateX(120%) translateY(-20px);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border-left: 4px solid var(--primary);
            max-width: 360px;
            font-weight: 500;
            color: var(--text-primary);
        }

        .toast.show {
            opacity: 1;
            visibility: visible;
            transform: translateX(0) translateY(0);
        }

        /* ============================================
           LOADING STATE - Skeleton Animation
           ============================================ */

        .loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 80px 0;
        }

        .loading-spinner {
            width: 48px;
            height: 48px;
            border: 3px solid var(--card-border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            color: var(--text-secondary);
            font-size: 15px;
            font-weight: 500;
        }

        .skeleton-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 24px;
            width: 100%;
            margin-top: 32px;
        }

        .skeleton-card {
            background: white;
            border-radius: var(--radius-lg);
            padding: 24px;
            border: 1px solid var(--card-border);
        }

        .skeleton {
            background: linear-gradient(
                90deg,
                var(--card-border) 25%,
                rgba(99, 102, 241, 0.08) 50%,
                var(--card-border) 75%
            );
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: var(--radius-sm);
        }

        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .skeleton-icon {
            width: 52px;
            height: 52px;
            margin-bottom: 16px;
            border-radius: var(--radius-md);
        }

        .skeleton-title {
            height: 20px;
            width: 65%;
            margin-bottom: 10px;
        }

        .skeleton-desc {
            height: 14px;
            width: 100%;
            margin-bottom: 8px;
        }

        .skeleton-desc-short {
            height: 14px;
            width: 45%;
        }

        .hidden {
            display: none !important;
        }

        /* Pull to Refresh */
        #pullRefresh {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            transform: translateY(-100%);
            transition: transform 0.3s ease;
            z-index: 50;
            color: var(--primary);
            font-weight: 600;
            gap: 10px;
        }

        #pullRefresh.visible {
            transform: translateY(0);
        }

        /* Announcement Bar */
        #announcementBar {
            background: linear-gradient(135deg, var(--primary), var(--accent-pink));
            padding: 14px 20px;
            text-align: center;
            position: sticky;
            top: 73px;
            z-index: 95;
            display: none;
            color: white;
            font-weight: 600;
            font-size: 14px;
        }

        /* ============================================
           THEME SELECTOR - Theme Picker UI
           ============================================ */

        .theme-option {
            position: relative;
            padding: 16px;
            border-radius: var(--radius-md);
            background: var(--bg-subtle);
            border: 2px solid var(--card-border);
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            text-align: center;
        }

        .theme-option:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(99, 102, 241, 0.2);
            border-color: var(--primary);
        }

        .theme-option.active {
            border-color: var(--primary);
            background: rgba(99, 102, 241, 0.05);
        }

        .theme-preview {
            width: 100%;
            height: 60px;
            border-radius: var(--radius-sm);
            margin-bottom: 10px;
            transition: transform 0.25s ease;
        }

        .theme-option:hover .theme-preview {
            transform: scale(1.05);
        }

        .theme-name {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
            display: block;
        }

        .theme-check {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: var(--primary);
            color: white;
            display: none;
            align-items: center;
            justify-content: center;
            font-size: 11px;
        }

        .theme-option.active .theme-check {
            display: flex;
        }

        @media (max-width: 768px) {
            .container {
                padding: 0 16px;
            }

            .hero {
                padding: 40px 0 32px;
            }

            .hero-title {
                font-size: 28px;
            }

            .hero-subtitle {
                font-size: 16px;
            }

            #toolsGrid {
                grid-template-columns: 1fr;
                gap: 16px;
                margin-bottom: 120px;
            }

            .search-container {
                margin-bottom: 24px;
            }

            #mainSearch {
                padding: 14px 50px 14px 20px;
                font-size: 15px;
            }

            .categories {
                margin-bottom: 24px;
            }

            #categoryFilter {
                gap: 8px;
                justify-content: flex-start;
                overflow-x: auto;
                flex-wrap: nowrap;
                padding-bottom: 8px;
                -webkit-overflow-scrolling: touch;
            }

            .category-btn {
                padding: 8px 18px;
                font-size: 13px;
                flex-shrink: 0;
            }

            .tool-card {
                padding: 20px;
            }

            .card-title {
                font-size: 17px;
            }

            .bottom-nav {
                bottom: 16px;
                padding: 10px 20px;
                gap: 20px;
                width: calc(100% - 32px);
                max-width: 400px;
            }

            .modal-content {
                padding: 24px;
                margin: 16px;
            }

            .skeleton-grid {
                grid-template-columns: 1fr;
                gap: 16px;
            }
        }

        @media (max-width: 480px) {
            .logo-text {
                font-size: 19px;
            }

            .logo-icon {
                width: 38px;
                height: 38px;
                font-size: 20px;
            }

            .hero-title {
                font-size: 26px;
            }

            .hero-subtitle {
                font-size: 15px;
                margin-bottom: 24px;
            }

            #mainSearch {
                padding: 12px 44px 12px 18px;
                font-size: 14px;
            }

            .category-btn {
                padding: 7px 16px;
                font-size: 12px;
            }

            .tool-card {
                padding: 18px;
            }

            .card-header {
                margin-bottom: 14px;
            }

            .card-icon {
                width: 48px;
                height: 48px;
                font-size: 22px;
            }

            .card-title {
                font-size: 16px;
            }

            .card-desc {
                font-size: 13px;
            }

            .card-footer {
                padding-top: 14px;
            }

            .card-action-btn {
                padding: 8px 18px;
                font-size: 12px;
            }

            .bottom-nav {
                padding: 8px 16px;
                gap: 12px;
            }

            .nav-icon {
                font-size: 18px;
            }

            .nav-label {
                font-size: 10px;
            }
        }
    </style>
</head>
<body>
    <!-- Skip link for accessibility -->
    <a href="#mainSearch" class="skip-link">跳过导航，直接搜索</a>

    <!-- Pull to Refresh -->
    <div id="pullRefresh">
        <i class="fas fa-sync-alt"></i>
        <span>刷新中...</span>
    </div>

    <!-- Announcement -->
    <div id="announcementBar">
        <span id="announcementText">🎉 AI Tool Hub v3.0 全新上线！全新UI + 安全加固 + 性能优化</span>
        <button onclick="closeAnnouncement()" style="margin-left: 12px; background: rgba(255,255,255,0.2); border: none; color: white; cursor: pointer; padding: 4px 8px; border-radius: 6px;">

        </button>

    <!-- Header -->
    <header id="mainHeader">
        <div class="container header-content">

                <div class="logo-icon">🤖</div>

            </a>
            <div class="header-actions">
                <button onclick="showShareModal()" class="header-btn" aria-label="分享">
                    <i class="fas fa-share-alt"></i>
                </button>
                <button onclick="toggleTheme()" class="header-btn" aria-label="切换主题">
                    <i id="themeIcon" class="fas fa-moon"></i>
                </button>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main>
        <div class="container">
            <!-- Hero Section -->
            <section class="hero">
                <div class="hero-badge">
                    <i class="fas fa-sparkles"></i>
                    <span>v3.0 全新升级 · 60+ 精选工具</span>
                </div>

                    发现最好的<br><span>AI 工具集合</span>
                </h1>

                    <button id="clearSearchBtn" class="hidden" aria-label="清除搜索">
                        <i class="fas fa-times"></i>

                        <div class="skeleton skeleton-desc"></div>
                        <div class="skeleton skeleton-desc skeleton-desc-short"></div>
                    </div>
                    <div class="skeleton-card">
                        <div class="skeleton skeleton-icon"></div>
                        <div class="skeleton skeleton-title"></div>
                        <div class="skeleton skeleton-desc"></div>
                        <div class="skeleton skeleton-desc skeleton-desc-short"></div>
                    </div>

            <!-- Tools Grid -->

    <!-- Bottom Navigation (Mobile) -->
    <nav class="bottom-nav" role="navigation" aria-label="底部导航">

            <i class="fas fa-home nav-icon"></i>
            <span class="nav-label">首页</span>
        </button>
        <button onclick="showAllTools()" aria-label="工具">
            <i class="fas fa-th-large nav-icon"></i>
            <span class="nav-label">工具</span>

        <button onclick="showShareModal()" aria-label="分享">
            <i class="fas fa-share-alt nav-icon"></i>
            <span class="nav-label">分享</span>
        </button>
        <button onclick="toggleTheme()" aria-label="主题">
            <i class="fas fa-moon nav-icon" id="themeIconNav"></i>
            <span class="nav-label">主题</span>
        </button>
    </nav>

    <!-- Share Modal -->
    <div id="shareModal" class="modal" onclick="closeShareModal(event)" role="dialog" aria-modal="true">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h3 class="modal-title">分享给朋友 👋</h3>

                <i class="fab fa-weixin" style="color: #07c160;"></i>
                <span>微信好友</span>
            </button>
            <button onclick="shareToQQ()" class="modal-option">
                <i class="fab fa-qq" style="color: #12b7f5;"></i>
                <span>QQ 好友</span>
            </button>
            <button onclick="copyShareLink()" class="modal-option">

            <button onclick="generateShareImage()" class="modal-option">
                <i class="fas fa-image" style="color: var(--accent-pink);"></i>
                <span>生成图片</span>
            </button>
        </div>
    </div>

    <!-- Update Modal -->
    <div id="updateModal" class="modal" onclick="closeUpdateModal()" role="dialog" aria-modal="true">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h3 class="modal-title">🎉 版本更新通知</h3>
            <div style="margin-bottom: 24px; color: var(--text-secondary); line-height: 1.7;">
                <p style="margin-bottom: 12px; font-weight: 600; color: var(--text-primary);">AI Tool Hub v3.0 全新上线！</p>
                <ul style="list-style: none; font-size: 14px;">
                    <li style="margin-bottom: 8px;">✨ 全新现代化 UI 设计</li>
                    <li style="margin-bottom: 8px;">🔒 企业级安全防护系统</li>
                    <li style="margin-bottom: 8px;">⚡ 性能优化提升 70%</li>
                    <li>📱 移动端体验全面升级</li>
                </ul>
            </div>
            <button onclick="closeUpdateModal()" style="width: 100%; padding: 14px; background: linear-gradient(135deg, var(--primary), var(--accent-pink)); color: white; border: none; border-radius: var(--radius-md); font-weight: 600; font-size: 15px; cursor: pointer; transition: all 0.25s ease;" onmouseover="this.style.transform='translateY(-2px)'" onmouseout="this.style.transform='translateY(0)'">
                太棒了，开始探索！
            </button>
        </div>
    </div>

    <!-- Theme Selector Modal -->
    <div id="themeModal" class="modal" onclick="closeThemeModal(event)" role="dialog" aria-modal="true">
        <div class="modal-content" onclick="event.stopPropagation()" style="max-width: 480px;">
            <h3 class="modal-title">🎨 选择主题</h3>
            <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px;" id="themeGrid">
                
                <button onclick="setTheme('default')" class="theme-option" data-theme-value="default">
                    <div class="theme-preview" style="background: linear-gradient(135deg, #6366f1, #ec4899);"></div>
                    <span class="theme-name">默认紫蓝</span>
                    <i class="fas fa-check theme-check"></i>
                </button>

                <button onclick="setTheme('midnight')" class="theme-option" data-theme-value="midnight">
                    <div class="theme-preview" style="background: linear-gradient(135deg, #1a1a2e, #0f3460);"></div>
                    <span class="theme-name">🌙 深夜模式</span>
                    <i class="fas fa-check theme-check"></i>
                </button>

                <button onclick="setTheme('lavender')" class="theme-option" data-theme-value="lavender">
                    <div class="theme-preview" style="background: linear-gradient(135deg, #ede9fe, #fce7f3);"></div>
                    <span class="theme-name">💜 薰衣草紫</span>
                    <i class="fas fa-check theme-check"></i>
                </button>

                <button onclick="setTheme('ocean')" class="theme-option" data-theme-value="ocean">
                    <div class="theme-preview" style="background: linear-gradient(135deg, #cffafe, #dbeafe);"></div>
                    <span class="theme-name">🌊 海洋蓝</span>
                    <i class="fas fa-check theme-check"></i>
                </button>

                <button onclick="setTheme('sakura')" class="theme-option" data-theme-value="sakura">
                    <div class="theme-preview" style="background: linear-gradient(135deg, #fce7f3, #fef3c7);"></div>
                    <span class="theme-name">🌸 樱花粉</span>
                    <i class="fas fa-check theme-check"></i>
                </button>

                <button onclick="setTheme('forest')" class="theme-option" data-theme-value="forest">
                    <div class="theme-preview" style="background: linear-gradient(135deg, #d1fae5, #ecfccb);"></div>
                    <span class="theme-name">🍃 森林绿</span>
                    <i class="fas fa-check theme-check"></i>
                </button>

                <button onclick="setTheme('sunset')" class="theme-option" data-theme-value="sunset" style="grid-column: span 2;">
                    <div class="theme-preview" style="background: linear-gradient(135deg, #ffedd5, #fef3c7);"></div>
                    <span class="theme-name">🔥 日落橙</span>
                    <i class="fas fa-check theme-check"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast">
        <span id="toastMsg"></span>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <script type="module" src="js/main.js"></script>
</body>
</html>
