<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Tool Hub v2.5 - 智能工具聚合平台</title>
    <meta name="description" content="一站式AI工具聚合导航平台，收录60+款优质AI工具，涵盖写作、绘画、代码、视频、语音、设计、办公等领域">
    <meta name="keywords" content="AI工具,人工智能,AI写作,AI绘画,AI代码,AI视频,AI语音,AI设计,AI办公">
    <meta name="author" content="AI Tool Hub">
    <meta name="theme-color" content="#6366f1">
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/pinyin-pro@3.18.2/dist/index.js"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        * { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; -webkit-tap-highlight-color: transparent; }
        html { scroll-behavior: smooth; }
        .glass { background: rgba(26, 26, 46, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(99, 102, 241, 0.2); }
        .glass-nav { background: rgba(10, 10, 15, 0.85); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(99, 102, 241, 0.15); }
        .glass-card { background: linear-gradient(135deg, rgba(99, 102, 241, 0.08) 0%, rgba(168, 85, 247, 0.08) 100%); backdrop-filter: blur(10px); border: 1px solid rgba(99, 102, 241, 0.2); transition: all 0.3s ease; }
        .glass-card:hover { transform: translateY(-8px); border-color: rgba(99, 102, 241, 0.5); box-shadow: 0 20px 40px rgba(99, 102, 241, 0.25); }
        .neon-text { text-shadow: 0 0 10px rgba(99, 102, 241, 0.8), 0 0 20px rgba(168, 85, 247, 0.6); }
        .gradient-text { background: linear-gradient(135deg, #6366f1 0%, #a855f7 50%, #06b6d4 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .category-btn.active { background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%); color: white; box-shadow: 0 0 20px rgba(99, 102, 241, 0.5); }
        .tag-stable { background: rgba(34, 197, 94, 0.15); color: #4ade80; border: 1px solid rgba(34, 197, 94, 0.3); }
        .tag-recommended { background: linear-gradient(135deg, rgba(251, 191, 36, 0.2), rgba(245, 158, 11, 0.2)); color: #fbbf24; border: 1px solid rgba(251, 191, 36, 0.4); }
        .tag-new { background: linear-gradient(135deg, rgba(99, 102, 241, 0.2), rgba(168, 85, 247, 0.2)); color: #a78bfa; border: 1px solid rgba(99, 102, 241, 0.4); animation: pulse 2s infinite; }
        .tag-beginner { background: rgba(16, 185, 129, 0.15); color: #34d399; border: 1px solid rgba(16, 185, 129, 0.3); }
        .tag-advanced { background: rgba(239, 68, 68, 0.15); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.3); }
        .pull-refresh { position: fixed; top: -60px; left: 0; right: 0; height: 60px; display: flex; align-items: center; justify-content: center; z-index: 100; transition: transform 0.3s ease; }
        .pull-refresh.visible { transform: translateY(60px); }
        .share-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 200; display: none; align-items: center; justify-content: center; }
        .share-modal.active { display: flex; }
        .announcement-bar { background: linear-gradient(90deg, #6366f1, #a855f7); color: white; padding: 8px; text-align: center; font-size: 14px; position: relative; }
        .announcement-bar .close { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); cursor: pointer; }
        .toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%) translateY(100px); background: rgba(26, 26, 46, 0.95); color: white; padding: 12px 24px; border-radius: 50px; border: 1px solid rgba(99, 102, 241, 0.3); opacity: 0; transition: all 0.3s ease; z-index: 1000; }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        .search-history { position: absolute; top: 100%; left: 0; right: 0; background: #1a1a2e; border: 1px solid rgba(99, 102, 241, 0.2); border-radius: 12px; margin-top: 8px; padding: 8px; z-index: 50; display: none; }
        .search-history.show { display: block; }
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(10, 10, 15, 0.95); border-top: 1px solid rgba(99, 102, 241, 0.2); padding: 8px; z-index: 90; display: none; }
        @media (max-width: 768px) { .bottom-nav { display: flex; } .floating-nav { display: none !important; } }
        .skeleton { background: linear-gradient(90deg, #1a1a2e 25%, #252542 50%, #1a1a2e 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        .update-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 300; display: none; align-items: center; justify-content: center; }
        .update-modal.active { display: flex; }
        /* Landscape Mode */
        @media (orientation: landscape) and (max-height: 500px) {
            .bottom-nav { display: none !important; }
            #navbar { position: relative; }
            #home { min-height: auto; padding: 2rem 0; }
        }
        /* Enhanced Touch Targets */
        @media (pointer: coarse) {
            .category-btn, .glass-card, button { min-height: 44px; min-width: 44px; }
            .bottom-nav a, .bottom-nav button { padding: 12px; }
        }
    </style>
</head>
<body class="bg-[#0a0a0f] text-gray-100 min-h-screen pb-16 md:pb-0">
    <!-- Pull to Refresh Indicator -->
    <div class="pull-refresh" id="pullRefresh"><i class="fas fa-sync-alt fa-spin text-2xl text-primary"></i></div>
    
    <!-- Announcement Bar -->
    <div class="announcement-bar" id="announcementBar" style="display: none;">
        <span id="announcementText"></span>
        <span class="close" onclick="closeAnnouncement()"><i class="fas fa-times"></i></span>
    </div>

    <!-- Update Modal -->
    <div class="update-modal" id="updateModal">
        <div class="glass p-8 rounded-2xl max-w-md mx-4 text-center">
            <i class="fas fa-rocket text-5xl text-primary mb-4"></i>
            <h3 class="text-2xl font-bold mb-2">发现新版本</h3>
            <p class="text-gray-400 mb-6">网站已更新到 v2.5，新增分享功能、键盘快捷键、搜索历史等</p>
            <button onclick="closeUpdateModal()" class="px-8 py-3 rounded-full bg-gradient-to-r from-primary to-secondary text-white font-medium">立即体验</button>
        </div>
    </div>

    <!-- Share Modal -->
    <div class="share-modal" id="shareModal" onclick="closeShareModal(event)">
        <div class="glass p-6 rounded-2xl max-w-sm mx-4" onclick="event.stopPropagation()">
            <h3 class="text-xl font-bold mb-4 text-center">分享</h3>
            <div class="grid grid-cols-4 gap-4 mb-6">
                <button onclick="shareToWeChat()" class="flex flex-col items-center gap-2 p-3 rounded-xl bg-dark-700 hover:bg-primary/20 transition-all">
                    <i class="fab fa-weixin text-2xl text-green-500"></i>
                    <span class="text-xs">微信</span>
                </button>
                <button onclick="shareToQQ()" class="flex flex-col items-center gap-2 p-3 rounded-xl bg-dark-700 hover:bg-primary/20 transition-all">
                    <i class="fab fa-qq text-2xl text-blue-500"></i>
                    <span class="text-xs">QQ</span>
                </button>
                <button onclick="copyShareLink()" class="flex flex-col items-center gap-2 p-3 rounded-xl bg-dark-700 hover:bg-primary/20 transition-all">
                    <i class="fas fa-link text-2xl text-primary"></i>
                    <span class="text-xs">复制</span>
                </button>
                <button onclick="generateShareImage()" class="flex flex-col items-center gap-2 p-3 rounded-xl bg-dark-700 hover:bg-primary/20 transition-all">
                    <i class="fas fa-image text-2xl text-purple-500"></i>
                    <span class="text-xs">图片</span>
                </button>
            </div>
            <button onclick="closeShareModal()" class="w-full py-3 rounded-xl bg-dark-700 text-gray-400 hover:text-white transition-all">取消</button>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"><i class="fas fa-check-circle mr-2 text-primary"></i><span id="toastMsg"></span></div>

    <!-- Navigation -->
    <nav class="glass-nav fixed top-0 left-0 right-0 z-50 transition-all" id="navbar">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex items-center justify-between h-14 md:h-16">
                <div class="flex items-center gap-3">
                    <div class="w-9 h-9 rounded-xl bg-gradient-to-br from-primary to-secondary flex items-center justify-center">
                        <i class="fas fa-robot text-white"></i>
                    </div>
                    <div>
                        <span class="font-bold gradient-text text-lg">AI Tool Hub</span>
                        <span class="text-xs text-primary ml-1">v2.5</span>
                    </div>
                </div>
                <div class="hidden md:flex items-center gap-6">
                    <a href="#home" class="text-gray-300 hover:text-white transition-colors text-sm">首页</a>
                    <a href="#tools" class="text-gray-300 hover:text-white transition-colors text-sm">工具</a>
                    <button onclick="showShareModal()" class="text-gray-300 hover:text-white transition-colors text-sm"><i class="fas fa-share-alt mr-1"></i>分享</button>
                    <button onclick="toggleTheme()" class="p-2 rounded-lg bg-dark-700/50 border border-primary/30">
                        <i class="fas fa-moon text-primary" id="themeIcon"></i>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="pt-14 md:pt-16">
        <!-- Hero Section -->
        <section id="home" class="min-h-[80vh] flex items-center justify-center relative overflow-hidden">
            <div class="absolute inset-0 opacity-20" style="background-image: radial-gradient(circle at 50% 50%, rgba(99, 102, 241, 0.1) 0%, transparent 50%);"></div>
            <div class="relative z-10 text-center px-4 max-w-4xl mx-auto">
                <div class="inline-flex items-center gap-2 px-4 py-2 rounded-full glass mb-6 animate-pulse">
                    <span class="w-2 h-2 bg-green-400 rounded-full"></span>
                    <span class="text-sm text-gray-300">v2.5 全新升级 | 支持键盘快捷键</span>
                </div>
                <h1 class="text-4xl md:text-6xl font-bold mb-4">
                    <span class="gradient-text neon-text">AI Tool Hub</span>
                </h1>
                <p class="text-lg md:text-xl text-gray-400 mb-8">发现最优质的 AI 工具，提升工作效率</p>
                <div class="flex flex-col sm:flex-row gap-4 justify-center">
                    <a href="#tools" class="px-8 py-4 rounded-full bg-gradient-to-r from-primary to-secondary text-white font-medium hover:shadow-lg hover:shadow-primary/30 transition-all">
                        探索工具
                    </a>
                    <button onclick="showShareModal()" class="px-8 py-4 rounded-full glass text-white font-medium hover:border-primary transition-all">
                        <i class="fas fa-share-alt mr-2"></i>分享
                    </button>
                </div>
                <div class="mt-8 flex justify-center gap-2 text-sm text-gray-500">
                    <span class="px-3 py-1 rounded-full bg-dark-700/50">按 / 键搜索</span>
                    <span class="px-3 py-1 rounded-full bg-dark-700/50">按 ESC 清空</span>
                </div>
            </div>
        </section>

        <!-- Tools Section -->
        <section id="tools" class="py-12 px-4">
            <div class="max-w-7xl mx-auto">
                <!-- Search Bar with History -->
                <div class="max-w-2xl mx-auto mb-8 relative">
                    <div class="relative">
                        <input type="text" id="mainSearch" placeholder="搜索工具（按 / 键快速聚焦）..." 
                            class="w-full bg-[#1a1a2e] border border-primary/30 rounded-2xl px-6 py-4 pl-12 text-white placeholder-gray-500 focus:outline-none focus:border-primary transition-all">
                        <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-500"></i>
                        <button onclick="clearSearch()" class="absolute right-4 top-1/2 -translate-y-1/2 text-gray-500 hover:text-white hidden" id="clearSearchBtn">
                            <i class="fas fa-times"></i>
                        </button>
                    </div>
                    <!-- Search History -->
                    <div class="search-history" id="searchHistory"></div>
                </div>

                <!-- Category Filter -->
                <div id="categoryFilter" class="flex flex-wrap justify-center gap-2 mb-8">
                    <button class="category-btn active px-5 py-2 rounded-full glass text-sm font-medium transition-all" data-category="all">全部</button>
                </div>

                <!-- Tools Grid -->
                <div id="toolsGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
                    <!-- Tools will be loaded here -->
                </div>

                <!-- Loading State -->
                <div id="loadingState" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
                    ${Array(8).fill(0).map(() => `
                        <div class="glass-card rounded-2xl p-5">
                            <div class="skeleton h-24 rounded-xl mb-4"></div>
                            <div class="skeleton h-4 w-3/4 rounded mb-2"></div>
                            <div class="skeleton h-3 w-full rounded"></div>
                        </div>
                    `).join('')}
                </div>
            </div>
        </section>
    </main>

    <!-- Bottom Navigation (Mobile) -->
    <nav class="bottom-nav justify-around" id="bottomNav">
        <a href="#home" class="flex flex-col items-center gap-1 p-2 text-primary"><i class="fas fa-home"></i><span class="text-xs">首页</span></a>
        <a href="#tools" class="flex flex-col items-center gap-1 p-2 text-gray-500"><i class="fas fa-th-large"></i><span class="text-xs">工具</span></a>
        <button onclick="showShareModal()" class="flex flex-col items-center gap-1 p-2 text-gray-500"><i class="fas fa-share-alt"></i><span class="text-xs">分享</span></button>
        <button onclick="toggleTheme()" class="flex flex-col items-center gap-1 p-2 text-gray-500"><i class="fas fa-moon"></i><span class="text-xs">主题</span></button>
    </nav>

    <script>
        // Global State
        let allTools = [];
        let categories = [];
        let currentCategory = 'all';
        let searchHistory = JSON.parse(localStorage.getItem('ai-tool-hub-search-history') || '[]');
        let favorites = JSON.parse(localStorage.getItem('ai-tool-hub-favorites') || '[]');
        
        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadTools();
            setupKeyboardShortcuts();
            setupPullToRefresh();
            checkForUpdate();
            loadAnnouncement();
            loadSavedFilters();
        });

        // Load Tools
        async function loadTools() {
            try {
                const response = await fetch('tools.json');
                const data = await response.json();
                allTools = data.tools;
                categories = data.categories;
                renderCategories();
                renderTools(allTools);
                document.getElementById('loadingState').classList.add('hidden');
            } catch (error) {
                showToast('加载失败，请刷新重试');
            }
        }

        // Render Categories
        function renderCategories() {
            const container = document.getElementById('categoryFilter');
            const buttons = categories.map(cat => 
                `<button class="category-btn px-5 py-2 rounded-full glass text-sm font-medium transition-all" data-category="${cat.id}" onclick="filterCategory('${cat.id}')">${cat.name}</button>`
            ).join('');
            container.innerHTML = '<button class="category-btn active px-5 py-2 rounded-full glass text-sm font-medium transition-all" data-category="all" onclick="filterCategory('all')">全部</button>' + buttons;
        }

        // Render Tools
        function renderTools(tools) {
            const grid = document.getElementById('toolsGrid');
            grid.innerHTML = tools.map(tool => `
                <div class="glass-card rounded-2xl p-5 group cursor-pointer" onclick="showToolDetail(${tool.id})">
                    <div class="flex items-start justify-between mb-3">
                        <div class="w-12 h-12 rounded-xl bg-gradient-to-br from-primary/20 to-secondary/20 flex items-center justify-center">
                            <i class="fas ${tool.icon} text-xl text-primary"></i>
                        </div>
                        <div class="flex gap-2">
                            ${tool.tags?.includes('new') ? '<span class="tag-new text-xs px-2 py-0.5 rounded-full">NEW</span>' : ''}
                            <button onclick="toggleFavorite(${tool.id}, event)" class="text-gray-500 hover:text-yellow-400 transition-all ${favorites.includes(tool.id) ? 'text-yellow-400' : ''}">
                                <i class="fas fa-star"></i>
                            </button>
                        </div>
                    </div>
                    <h3 class="font-bold text-white mb-1">${tool.name}</h3>
                    <p class="text-gray-400 text-sm mb-3 line-clamp-2">${tool.desc}</p>
                    <div class="flex flex-wrap gap-1 mb-3">
                        ${tool.tags?.includes('free') ? '<span class="tag-stable text-xs px-2 py-0.5 rounded">免费</span>' : ''}
                        ${tool.tags?.includes('hot') ? '<span class="tag-recommended text-xs px-2 py-0.5 rounded">热门</span>' : ''}
                    </div>
                    <div class="flex items-center justify-between">
                        <span class="text-xs text-gray-500">${categories.find(c => c.id === tool.category)?.name}</span>
                        <button onclick="openTool(${tool.id}, '${tool.url}', event)" class="px-4 py-2 rounded-lg bg-gradient-to-r from-primary to-secondary text-white text-sm hover:shadow-lg transition-all">
                            使用
                        </button>
                    </div>
                </div>
            `).join('');
        }

        // Filter Category with memory
        function filterCategory(category) {
            currentCategory = category;
            localStorage.setItem('ai-tool-hub-filter-category', category);
            document.querySelectorAll('.category-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.dataset.category === category) btn.classList.add('active');
            });
            const filtered = category === 'all' ? allTools : allTools.filter(t => t.category === category);
            renderTools(filtered);
        }

        // Load saved filters
        function loadSavedFilters() {
            const savedCategory = localStorage.getItem('ai-tool-hub-filter-category');
            if (savedCategory && savedCategory !== 'all') {
                setTimeout(() => filterCategory(savedCategory), 500);
            }
        }

        // Search with History
        const searchInput = document.getElementById('mainSearch');
        searchInput.addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            document.getElementById('clearSearchBtn').classList.toggle('hidden', !term);
            
            const filtered = allTools.filter(tool => 
                tool.name.toLowerCase().includes(term) || 
                tool.desc.toLowerCase().includes(term)
            );
            renderTools(filtered);
            
            if (term && !searchHistory.includes(term)) {
                searchHistory.unshift(term);
                searchHistory = searchHistory.slice(0, 10);
                localStorage.setItem('ai-tool-hub-search-history', JSON.stringify(searchHistory));
            }
        });

        searchInput.addEventListener('focus', () => {
            if (searchHistory.length > 0) {
                document.getElementById('searchHistory').innerHTML = searchHistory.map(h => 
                    `<div class="px-4 py-2 hover:bg-primary/20 cursor-pointer flex items-center gap-2" onclick="setSearch('${h}')">
                        <i class="fas fa-history text-gray-500 text-sm"></i><span>${h}</span>
                    </div>`
                ).join('');
                document.getElementById('searchHistory').classList.add('show');
            }
        });

        document.addEventListener('click', (e) => {
            if (!e.target.closest('.search-history') && !e.target.closest('#mainSearch')) {
                document.getElementById('searchHistory').classList.remove('show');
            }
        });

        function setSearch(term) {
            searchInput.value = term;
            document.getElementById('searchHistory').classList.remove('show');
            searchInput.dispatchEvent(new Event('input'));
        }

        function clearSearch() {
            searchInput.value = '';
            document.getElementById('clearSearchBtn').classList.add('hidden');
            renderTools(allTools);
        }

        // Keyboard Shortcuts
        function setupKeyboardShortcuts() {
            document.addEventListener('keydown', (e) => {
                if (e.key === '/' || e.key === 's' || e.key === 'S') {
                    if (document.activeElement !== searchInput) {
                        e.preventDefault();
                        searchInput.focus();
                    }
                }
                if (e.key === 'Escape') {
                    clearSearch();
                    document.getElementById('searchHistory').classList.remove('show');
                    closeShareModal();
                }
            });
        }

        // Pull to Refresh (Mobile)
        function setupPullToRefresh() {
            let startY = 0;
            let refreshing = false;
            
            document.addEventListener('touchstart', (e) => {
                if (window.scrollY === 0) startY = e.touches[0].clientY;
            }, { passive: true });
            
            document.addEventListener('touchmove', (e) => {
                if (refreshing || window.scrollY > 0) return;
                const diff = e.touches[0].clientY - startY;
                if (diff > 80) {
                    document.getElementById('pullRefresh').classList.add('visible');
                }
            }, { passive: true });
            
            document.addEventListener('touchend', () => {
                if (document.getElementById('pullRefresh').classList.contains('visible')) {
                    refreshing = true;
                    setTimeout(() => {
                        location.reload();
                    }, 500);
                }
            });
        }

        // Tool Actions
        function openTool(id, url, event) {
            event.stopPropagation();
            window.open(url, '_blank');
        }

        function toggleFavorite(id, event) {
            event.stopPropagation();
            const index = favorites.indexOf(id);
            if (index > -1) {
                favorites.splice(index, 1);
                showToast('已取消收藏');
            } else {
                favorites.push(id);
                showToast('已收藏');
            }
            localStorage.setItem('ai-tool-hub-favorites', JSON.stringify(favorites));
            renderTools(currentCategory === 'all' ? allTools : allTools.filter(t => t.category === currentCategory));
        }

        // Share Functions
        function showShareModal() {
            document.getElementById('shareModal').classList.add('active');
        }

        function closeShareModal(event) {
            if (!event || event.target === document.getElementById('shareModal')) {
                document.getElementById('shareModal').classList.remove('active');
            }
        }

        function shareToWeChat() {
            showToast('请截图分享到微信');
        }

        function shareToQQ() {
            const url = `https://connect.qq.com/widget/shareqq/index.html?url=${encodeURIComponent(window.location.href)}&title=AI%20Tool%20Hub`;
            window.open(url, '_blank');
        }

        function copyShareLink() {
            navigator.clipboard.writeText(window.location.href).then(() => showToast('链接已复制'));
        }

        async function generateShareImage() {
            const shareCard = document.createElement('div');
            shareCard.innerHTML = `
                <div style="width: 375px; padding: 30px; background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 100%); border-radius: 20px; font-family: Inter, sans-serif; color: white;">
                    <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 24px;">
                        <div style="width: 50px; height: 50px; background: linear-gradient(135deg, #6366f1, #a855f7); border-radius: 12px; display: flex; align-items: center; justify-content: center;">
                            <span style="font-size: 28px;">🤖</span>
                        </div>
                        <div>
                            <div style="font-size: 24px; font-weight: bold; background: linear-gradient(135deg, #6366f1, #a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">AI Tool Hub</div>
                            <div style="font-size: 14px; color: #9ca3af;">一站式AI工具导航平台</div>
                        </div>
                    </div>
                    <div style="background: rgba(99, 102, 241, 0.1); border: 1px solid rgba(99, 102, 241, 0.3); border-radius: 16px; padding: 20px; margin-bottom: 20px;">
                        <div style="font-size: 20px; font-weight: bold; margin-bottom: 8px;">60+ 优质AI工具</div>
                        <div style="font-size: 14px; color: #9ca3af; line-height: 1.6;">涵盖写作、绘画、代码、视频、语音、设计、办公等领域</div>
                    </div>
                    <div style="display: flex; gap: 8px; margin-bottom: 20px;">
                        <span style="padding: 6px 12px; background: rgba(34, 197, 94, 0.2); color: #4ade80; border-radius: 20px; font-size: 12px;">免费访问</span>
                        <span style="padding: 6px 12px; background: rgba(99, 102, 241, 0.2); color: #818cf8; border-radius: 20px; font-size: 12px;">v2.5新版</span>
                    </div>
                    <div style="text-align: center; padding-top: 16px; border-top: 1px solid rgba(255,255,255,0.1);">
                        <div style="font-size: 12px; color: #6b7280; margin-bottom: 8px;">扫描二维码访问</div>
                        <div style="width: 80px; height: 80px; background: white; margin: 0 auto; border-radius: 8px; display: flex; align-items: center; justify-content: center; color: #0a0a0f; font-size: 10px;">扫码访问</div>
                    </div>
                </div>
            `;
            shareCard.style.position = 'fixed';
            shareCard.style.left = '-9999px';
            document.body.appendChild(shareCard);
            
            try {
                showToast('正在生成分享图片...');
                const canvas = await html2canvas(shareCard.firstElementChild, {
                    backgroundColor: null,
                    scale: 2
                });
                
                const link = document.createElement('a');
                link.download = 'AI-Tool-Hub-分享.png';
                link.href = canvas.toDataURL();
                link.click();
                
                showToast('分享图片已生成');
            } catch (error) {
                console.error('生成图片失败:', error);
                showToast('生成图片失败');
            } finally {
                document.body.removeChild(shareCard);
            }
        }

        // Theme Toggle
        function toggleTheme() {
            document.documentElement.classList.toggle('dark');
            const isDark = document.documentElement.classList.contains('dark');
            document.getElementById('themeIcon').className = `fas fa-${isDark ? 'moon' : 'sun'} ${isDark ? 'text-primary' : 'text-yellow-400'}`;
        }

        // Toast
        function showToast(msg) {
            const toast = document.getElementById('toast');
            document.getElementById('toastMsg').textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        // Announcement
        function loadAnnouncement() {
            const announcement = localStorage.getItem('ai-tool-hub-announcement');
            if (announcement && !localStorage.getItem('ai-tool-hub-announcement-closed')) {
                document.getElementById('announcementText').textContent = announcement;
                document.getElementById('announcementBar').style.display = 'block';
            }
        }

        function closeAnnouncement() {
            document.getElementById('announcementBar').style.display = 'none';
            localStorage.setItem('ai-tool-hub-announcement-closed', 'true');
        }

        // Update Check
        function checkForUpdate() {
            if (!localStorage.getItem('ai-tool-hub-v2-5-shown')) {
                document.getElementById('updateModal').classList.add('active');
                localStorage.setItem('ai-tool-hub-v2-5-shown', 'true');
            }
        }

        function closeUpdateModal() {
            document.getElementById('updateModal').classList.remove('active');
        }

        // Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(console.error);
        }
    </script>
</body>
</html>
