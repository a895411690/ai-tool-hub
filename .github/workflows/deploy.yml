name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# 设置GITHUB_TOKEN的写入权限
permissions:
  contents: write
  pages: write
  id-token: write

# 允许一个并发部署
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  # 检查和构建作业
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies (if any)
        run: |
          # 检查是否有package.json，如果有则安装依赖
          if [ -f "package.json" ]; then
            npm ci
          else
            echo "No package.json found, skipping npm install"
          fi

      - name: Validate HTML
        run: |
          # 安装html5validator进行HTML验证
          sudo apt-get update
          sudo apt-get install -y html5validator
          # 验证所有HTML文件
          html5validator --root . --match "*.html" --ignore "node_modules/*" || echo "HTML validation completed"

      - name: Check JavaScript syntax
        run: |
          # 检查所有JS文件的语法
          for js_file in $(find . -name "*.js" -not -path "./node_modules/*"); do
            node -c "$js_file" || echo "Syntax check for $js_file"
          done

      - name: Run tests (if any)
        run: |
          # 检查是否有测试脚本，有则运行
          if [ -f "package.json" ]; then
            npm test || echo "Tests completed"
          else
            echo "No tests found, skipping test execution"
          fi

      - name: Build (if needed)
        run: |
          # 检查是否有构建脚本，有则运行
          if [ -f "package.json" ]; then
            npm run build || echo "Build completed"
          else
            echo "No build script found, skipping build"
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  # 部署作业（仅对main分支的push触发）
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    needs: build-and-test

    # 仅对main分支的push触发部署
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4