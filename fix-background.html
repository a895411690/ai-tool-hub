<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>修复背景测试</title>
    <style>
        /* 确保body背景不会被覆盖 */
        body {
            background: 
                /* 扫描线效果 */
                repeating-linear-gradient(
                    0deg,
                    transparent,
                    transparent 2px,
                    rgba(0, 255, 255, 0.03) 2px,
                    rgba(0, 255, 255, 0.03) 4px
                ),
                /* 网格透视效果 */
                linear-gradient(
                    to bottom,
                    transparent 0%,
                    rgba(0, 255, 255, 0.05) 50%,
                    rgba(255, 0, 255, 0.08) 100%
                ),
                /* 动态光点 */
                radial-gradient(2px 2px at 40px 60px, rgba(0, 255, 255, 0.6), transparent),
                radial-gradient(1px 1px at 120px 90px, rgba(255, 0, 255, 0.5), transparent),
                radial-gradient(2px 2px at 200px 150px, rgba(255, 255, 0, 0.4), transparent),
                radial-gradient(1px 1px at 300px 40px, rgba(0, 255, 255, 0.5), transparent),
                radial-gradient(2px 2px at 400px 180px, rgba(255, 0, 255, 0.4), transparent),
                radial-gradient(1px 1px at 500px 80px, rgba(0, 255, 255, 0.6), transparent),
                radial-gradient(2px 2px at 600px 200px, rgba(255, 255, 0, 0.5), transparent),
                /* 基础渐变 */
                linear-gradient(180deg, 
                    #0a0a0f 0%, 
                    #0d0d12 30%, 
                    #0a0a12 60%, 
                    #050508 100%
                ) !important;
            background-attachment: fixed !important;
            color: white !important;
            margin: 0 !important;
            min-height: 100vh !important;
        }
        
        /* 防止任何可能的白色背景 */
        * {
            box-sizing: border-box;
        }
        
        .test-content {
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
            background: rgba(10, 10, 15, 0.7);
            border-radius: 10px;
            margin-top: 50px;
        }
        
        h1 {
            color: #00ffff;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
        }
    </style>
</head>
<body class="text-gray-100 min-h-screen tech-bg">
    <div class="test-content">
        <h1>AI Tool Hub 背景修复测试</h1>
        <p><strong>当前状态：</strong>背景应该显示为黑色赛博朋克风格</p>
        <p><strong>发现问题：</strong>CSS中的.tech-bg类已修复，body选择器现在包含.tech-bg</p>
        <p><strong>如果仍显示白色背景：</strong></p>
        <ol>
            <li>CSS文件可能没有被正确加载</li>
            <li>Tailwind CSS可能覆盖了背景样式</li>
            <li>浏览器缓存问题</li>
        </ol>
        
        <h2>验证步骤：</h2>
        <p>1. 检查浏览器开发者工具中的"Elements"面板，查看body元素的样式</p>
        <p>2. 检查"Network"面板，确认main.css是否成功加载</p>
        <p>3. 检查是否有任何CSS覆盖了背景样式</p>
    </div>
</body>
</html>
