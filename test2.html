<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>测试页面</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0f;
            color: #ffffff;
            line-height: 1.6;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }
        .loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 50px 0;
        }
        .loading-text {
            margin-bottom: 20px;
            color: #9ca3af;
            font-size: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .loading-spinner {
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        #toolsGrid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin: 30px 0;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 20px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(10px);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>AI Tool Hub</h1>
        <div id="loadingState" class="loading">
            <div class="loading-text">
                <i class="fas fa-spinner fa-spin loading-spinner"></i>
                <span>加载中...</span>
            </div>
        </div>
        <div id="toolsGrid" class="tools-grid"></div>
    </div>
    <script>
        async function loadTools() {
            try {
                console.log('开始加载工具...');
                const response = await fetch('tools.json');
                console.log('fetch response:', response);
                
                if (!response.ok) {
                    throw new Error(`网络请求失败: ${response.status}`);
                }
                
                const data = await response.json();
                console.log('工具数据加载成功:', data);
                
                if (!data || !Array.isArray(data.tools) || !Array.isArray(data.categories)) {
                    throw new Error('工具数据结构不正确');
                }
                
                const allTools = data.tools;
                const categories = data.categories;
                console.log('工具数据已更新:', { allTools: allTools.length, categories: categories.length });
                
                console.log('开始渲染工具...');
                const grid = document.getElementById('toolsGrid');
                console.log('toolsGrid element:', grid);
                if (grid) {
                    grid.innerHTML = allTools.map(tool => `
                        <div class="glass-card rounded-2xl p-5 group cursor-pointer">
                            <div class="flex items-start justify-between mb-3">
                                <div class="w-12 h-12 rounded-xl bg-gradient-to-br from-blue-500/20 to-purple-500/20 flex items-center justify-center">
                                    <i class="fas ${tool.icon} text-xl text-blue-500"></i>
                                </div>
                            </div>
                            <h3 class="font-bold text-white mb-1">${tool.name}</h3>
                            <p class="text-gray-400 text-sm mb-3">${tool.desc}</p>
                            <div class="flex items-center justify-between">
                                <span class="text-xs text-gray-500">${categories.find(c => c.id === tool.category)?.name}</span>
                                <button class="px-4 py-2 rounded-lg bg-gradient-to-r from-blue-500 to-purple-500 text-white text-sm">使用</button>
                            </div>
                        </div>
                    `).join('');
                    console.log('工具渲染成功');
                } else {
                    console.error('未找到toolsGrid元素');
                }
                
                console.log('开始隐藏加载状态...');
                const loadingState = document.getElementById('loadingState');
                console.log('loadingState element:', loadingState);
                if (loadingState) {
                    loadingState.classList.add('hidden');
                    console.log('加载状态已隐藏');
                } else {
                    console.error('未找到loadingState元素');
                }
            } catch (error) {
                console.error('加载工具失败:', error);
            }
        }
        
        // 页面加载完成后执行
        window.addEventListener('DOMContentLoaded', loadTools);
    </script>
</body>
</html>
