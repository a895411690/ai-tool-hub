<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 简历优化 - AI Tool Hub</title>
    <meta name="description" content="AI驱动的简历优化工具，支持实时预览和一键导出">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link rel="stylesheet" href="./src/styles/main.css">
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen">
    <!-- Navigation -->
    <nav class="fixed top-0 left-0 right-0 z-50 bg-gray-900/80 backdrop-blur-md border-b border-gray-800">
        <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
            <a href="../../index.html" class="flex items-center gap-2 text-gray-400 hover:text-white transition-colors">
                <i class="fas fa-arrow-left"></i>
                <span>返回 AI Tool Hub</span>
            </a>
            <div class="flex items-center gap-3">
                <i class="fas fa-file-alt text-indigo-400"></i>
                <span class="font-semibold">AI 简历优化</span>
                <span class="text-xs bg-indigo-500/20 text-indigo-400 px-2 py-0.5 rounded">Beta</span>
            </div>
            <div class="w-24"></div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="pt-16 h-screen">
        <div class="grid grid-cols-1 lg:grid-cols-2 h-full">
            <!-- Left: Editor -->
            <div class="h-full overflow-y-auto border-r border-gray-800">
                <div class="p-6">
                    <h2 class="text-xl font-bold mb-6 flex items-center gap-2">
                        <i class="fas fa-edit text-indigo-400"></i>
                        简历编辑
                    </h2>
                    <div id="resumeForm" class="space-y-6">
                        <!-- Form content will be loaded here -->
                    </div>
                </div>
            </div>

            <!-- Right: Preview -->
            <div class="h-full overflow-y-auto bg-gray-800/50">
                <div class="p-6">
                    <div class="flex items-center justify-between mb-6">
                        <h2 class="text-xl font-bold flex items-center gap-2">
                            <i class="fas fa-eye text-indigo-400"></i>
                            实时预览
                        </h2>
                        <div class="flex gap-2">
                            <button onclick="aiOptimizer.openPanel()" class="px-4 py-2 bg-gradient-to-r from-purple-500 to-indigo-600 rounded-lg text-sm font-medium hover:opacity-90 transition-opacity">
                                <i class="fas fa-wand-magic-sparkles mr-2"></i>
                                AI 优化
                            </button>
                            <button onclick="pdfGenerator.download()" class="px-4 py-2 bg-indigo-600 rounded-lg text-sm font-medium hover:bg-indigo-700 transition-colors">
                                <i class="fas fa-download mr-2"></i>
                                导出 PDF
                            </button>
                        </div>
                    </div>
                    <div id="resumePreview" class="bg-white rounded-lg shadow-xl overflow-hidden">
                        <!-- Preview content will be loaded here -->
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- AI Optimizer Panel -->
    <div id="aiPanel" class="fixed inset-0 z-50 hidden">
        <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" onclick="aiOptimizer.closePanel()"></div>
        <div class="absolute right-0 top-0 h-full w-full max-w-md bg-gray-900 border-l border-gray-800 shadow-2xl transform translate-x-full transition-transform duration-300" id="aiPanelContent">
            <div class="p-6 h-full flex flex-col">
                <div class="flex items-center justify-between mb-6">
                    <h3 class="text-lg font-bold flex items-center gap-2">
                        <i class="fas fa-robot text-purple-400"></i>
                        AI 简历优化
                    </h3>
                    <button onclick="aiOptimizer.closePanel()" class="text-gray-400 hover:text-white">
                        <i class="fas fa-times text-xl"></i>
                    </button>
                </div>
                <div class="flex-1 overflow-y-auto space-y-4">
                    <div class="p-4 bg-gray-800/50 rounded-lg border border-gray-700">
                        <label class="block text-sm font-medium mb-2">职位描述</label>
                        <textarea id="jobDescription" rows="6" class="w-full bg-gray-900 border border-gray-700 rounded-lg p-3 text-sm focus:border-indigo-500 focus:outline-none resize-none" placeholder="粘贴目标职位的职位描述，AI将据此优化您的简历..."></textarea>
                    </div>
                    <button onclick="aiOptimizer.optimize()" id="optimizeBtn" class="w-full py-3 bg-gradient-to-r from-purple-500 to-indigo-600 rounded-lg font-medium hover:opacity-90 transition-opacity">
                        <i class="fas fa-wand-magic-sparkles mr-2"></i>
                        开始优化
                    </button>
                    <div id="optimizationResult" class="hidden space-y-4">
                        <!-- AI suggestions will appear here -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="./src/lib/store.js"></script>
    <script src="./src/lib/pdfGenerator.js"></script>
    <script src="./src/lib/aiOptimizer.js"></script>
    <script src="./src/components/resumeForm.js"></script>
    <script src="./src/components/resumePreview.js"></script>
    <script src="./src/app.js"></script>
</body>
</html>
