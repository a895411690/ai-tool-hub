<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 简历优化工具 - 测试套件</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #1e1b4b 0%, #312e81 100%);
            color: #e5e7eb;
            min-height: 100vh;
            padding: 2rem;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            font-size: 2rem;
            font-weight: bold;
            margin-bottom: 1rem;
            color: #a78bfa;
        }
        .test-suite {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 0.5rem;
            padding: 1.5rem;
            margin-bottom: 1rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .test-suite h2 {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: #c4b5fd;
        }
        .test-result {
            padding: 0.75rem;
            margin: 0.5rem 0;
            border-radius: 0.375rem;
            font-family: 'Monaco', 'Menlo', monospace;
            font-size: 0.875rem;
        }
        .test-result.pass {
            background: rgba(34, 197, 94, 0.1);
            border-left: 3px solid #22c55e;
            color: #86efac;
        }
        .test-result.fail {
            background: rgba(239, 68, 68, 0.1);
            border-left: 3px solid #ef4444;
            color: #fca5a5;
        }
        .test-result.pending {
            background: rgba(234, 179, 8, 0.1);
            border-left: 3px solid #eab308;
            color: #fde047;
        }
        .summary {
            background: rgba(99, 102, 241, 0.1);
            border: 1px solid rgba(99, 102, 241, 0.3);
            border-radius: 0.5rem;
            padding: 1rem;
            margin-top: 2rem;
        }
        .summary h2 {
            font-size: 1.125rem;
            font-weight: 600;
            margin-bottom: 0.75rem;
            color: #818cf8;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1rem;
            margin-top: 1rem;
        }
        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 1rem;
            border-radius: 0.375rem;
            text-align: center;
        }
        .stat-number {
            font-size: 2rem;
            font-weight: bold;
            margin-bottom: 0.25rem;
        }
        .stat-number.pass { color: #22c55e; }
        .stat-number.fail { color: #ef4444; }
        .stat-number.total { color: #818cf8; }
        .stat-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            color: #9ca3af;
        }
        .run-btn {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 0.5rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 1rem;
            transition: transform 0.15s ease;
        }
        .run-btn:hover {
            transform: translateY(-2px);
        }
        .run-btn:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧪 AI 简历优化工具 - 测试套件</h1>
        <p style="color: #9ca3af; margin-bottom: 1rem;">轻量级测试框架 - 零依赖</p>
        
        <button class="run-btn" onclick="runAllTests()">
            ▶️ 运行所有测试
        </button>
        
        <div id="test-results"></div>
        
        <div class="summary" id="summary" style="display: none;">
            <h2>📊 测试摘要</h2>
            <div class="stats">
                <div class="stat-card">
                    <div class="stat-number total" id="total-tests">0</div>
                    <div class="stat-label">总测试数</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number pass" id="pass-tests">0</div>
                    <div class="stat-label">通过</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number fail" id="fail-tests">0</div>
                    <div class="stat-label">失败</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 轻量级测试框架
        class TestRunner {
            constructor() {
                this.tests = [];
                this.results = { pass: 0, fail: 0, total: 0 };
            }

            describe(suiteName, testFn) {
                const suite = { name: suiteName, tests: [] };
                this.currentSuite = suite;
                testFn();
                this.tests.push(suite);
            }

            it(testName, testFn) {
                if (this.currentSuite) {
                    this.currentSuite.tests.push({ name: testName, fn: testFn });
                }
            }

            expect(actual) {
                return {
                    toBe: (expected) => {
                        if (actual !== expected) {
                            throw new Error(`Expected ${expected}, but got ${actual}`);
                        }
                    },
                    toEqual: (expected) => {
                        if (JSON.stringify(actual) !== JSON.stringify(expected)) {
                            throw new Error(`Expected ${JSON.stringify(expected)}, but got ${JSON.stringify(actual)}`);
                        }
                    },
                    toBeTruthy: () => {
                        if (!actual) {
                            throw new Error(`Expected truthy value, but got ${actual}`);
                        }
                    },
                    toBeFalsy: () => {
                        if (actual) {
                            throw new Error(`Expected falsy value, but got ${actual}`);
                        }
                    },
                    toContain: (item) => {
                        if (!actual.includes(item)) {
                            throw new Error(`Expected to contain ${item}`);
                        }
                    },
                    toBeGreaterThan: (value) => {
                        if (actual <= value) {
                            throw new Error(`Expected ${actual} to be greater than ${value}`);
                        }
                    },
                    toBeInstanceOf: (className) => {
                        if (!(actual instanceof className)) {
                            throw new Error(`Expected instance of ${className.name}`);
                        }
                    }
                };
            }

            async runAll() {
                const resultsContainer = document.getElementById('test-results');
                resultsContainer.innerHTML = '';

                for (const suite of this.tests) {
                    const suiteDiv = document.createElement('div');
                    suiteDiv.className = 'test-suite';
                    suiteDiv.innerHTML = `<h2>${suite.name}</h2>`;

                    for (const test of suite.tests) {
                        const resultDiv = document.createElement('div');
                        resultDiv.className = 'test-result pending';
                        resultDiv.textContent = `⏳ ${test.name}`;
                        suiteDiv.appendChild(resultDiv);

                        try {
                            await test.fn();
                            resultDiv.className = 'test-result pass';
                            resultDiv.textContent = `✅ ${test.name}`;
                            this.results.pass++;
                        } catch (error) {
                            resultDiv.className = 'test-result fail';
                            resultDiv.textContent = `❌ ${test.name}: ${error.message}`;
                            this.results.fail++;
                        }
                        this.results.total++;
                    }

                    resultsContainer.appendChild(suiteDiv);
                }

                this.showSummary();
            }

            showSummary() {
                const summary = document.getElementById('summary');
                summary.style.display = 'block';
                
                document.getElementById('total-tests').textContent = this.results.total;
                document.getElementById('pass-tests').textContent = this.results.pass;
                document.getElementById('fail-tests').textContent = this.results.fail;
            }
        }

        const runner = new TestRunner();

        // ==================== 测试套件 ====================

        // 1. 本地存储测试
        runner.describe('📦 本地存储功能', () => {
            runner.it('应该能够保存数据到 localStorage', () => {
                const testData = { name: '测试用户', email: 'test@example.com' };
                localStorage.setItem('test_data', JSON.stringify(testData));
                
                const retrieved = JSON.parse(localStorage.getItem('test_data'));
                runner.expect(retrieved.name).toBe('测试用户');
                
                localStorage.removeItem('test_data');
            });

            runner.it('应该能够清除 localStorage 数据', () => {
                localStorage.setItem('test_clear', 'data');
                localStorage.removeItem('test_clear');
                
                runner.expect(localStorage.getItem('test_clear')).toBeFalsy();
            });
        });

        // 2. 表单验证测试
        runner.describe('📝 表单验证功能', () => {
            runner.it('应该验证邮箱格式', () => {
                const validEmail = 'user@example.com';
                const invalidEmail = 'invalid-email';
                
                const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                runner.expect(emailRegex.test(validEmail)).toBeTruthy();
                runner.expect(emailRegex.test(invalidEmail)).toBeFalsy();
            });

            runner.it('应该验证电话号码格式', () => {
                const validPhone = '13800138000';
                const invalidPhone = '123';
                
                const phoneRegex = /^1[3-9]\d{9}$/;
                runner.expect(phoneRegex.test(validPhone)).toBeTruthy();
                runner.expect(phoneRegex.test(invalidPhone)).toBeFalsy();
            });
        });

        // 3. 简历数据结构测试
        runner.describe('📄 简历数据结构', () => {
            runner.it('应该创建有效的简历数据结构', () => {
                const resume = {
                    profile: {
                        name: '张三',
                        title: '前端工程师',
                        email: 'zhangsan@example.com',
                        phone: '13800138000'
                    },
                    experience: [],
                    education: [],
                    skills: []
                };
                
                runner.expect(resume.profile.name).toBe('张三');
                runner.expect(resume.experience).toEqual([]);
                runner.expect(Array.isArray(resume.skills)).toBeTruthy();
            });

            runner.it('应该能够添加工作经历', () => {
                const resume = { experience: [] };
                resume.experience.push({
                    company: '测试公司',
                    position: '工程师',
                    period: '2020-2023'
                });
                
                runner.expect(resume.experience.length).toBe(1);
                runner.expect(resume.experience[0].company).toBe('测试公司');
            });
        });

        // 4. XSS 防护测试
        runner.describe('🔒 安全性测试', () => {
            runner.it('应该正确转义 HTML 特殊字符', () => {
                const escapeHtml = (text) => {
                    if (typeof text !== 'string') return '';
                    return text
                        .replace(/&/g, '&amp;')
                        .replace(/</g, '&lt;')
                        .replace(/>/g, '&gt;')
                        .replace(/"/g, '&quot;')
                        .replace(/'/g, '&#39;');
                };
                
                const malicious = '<script>alert("XSS")</script>';
                const escaped = escapeHtml(malicious);
                
                runner.expect(escaped).toContain('&lt;');
                runner.expect(escaped).not.toContain('<script>');
            });
        });

        // 5. 性能测试
        runner.describe('⚡ 性能测试', () => {
            runner.it('应该在合理时间内完成数据处理', () => {
                const start = performance.now();
                
                // 模拟数据处理
                const data = [];
                for (let i = 0; i < 1000; i++) {
                    data.push({ id: i, value: `Item ${i}` });
                }
                
                const end = performance.now();
                const duration = end - start;
                
                runner.expect(duration).toBeLessThan(100); // 应该在 100ms 内完成
            });
        });

        // 运行所有测试
        function runAllTests() {
            runner.runAll();
        }
    </script>
</body>
</html>
