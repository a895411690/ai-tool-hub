<!DOCTYPE html>
<html>
<head>
    <title>简历导入功能验证</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .result { border: 1px solid #ccc; padding: 15px; margin: 10px 0; background: #f9f9f9; }
        .success { color: green; }
        .error { color: red; }
        .info { color: blue; }
    </style>
</head>
<body>
    <h1>简历导入功能修复验证</h1>
    
    <div id="testResults">
        <h2>验证结果:</h2>
        <div id="results"></div>
    </div>

    <script type="module">
        import { importUtils } from './src/lib/importUtils.js';
        
        // 测试简历内容
        const testResume = `个人简历-卫家豪

个人信息
姓名：卫家豪
电话：13311667685
邮箱：895411690@qq.com
性别：男
工作经验：8年
求职意向：测试工程师（资深/管理）

工作经历
零售信贷核心重构及企业级架构项目   高级测试工程师   2023.02-2025.01
项目描述：交通银行启动零售信贷核心重构及企业级架构项目，作为数字化转型战略的关键组成部分，旨在构建高效的数字化经营体系，提升业务灵活性，优化客户体验，并强化风险管理。

测试规划：在项目中根据需求文档制定详细测试计划，配置测试环境，确保测试覆盖全面。

广发信用卡新核心项目   测试组长   2022.10-2023.01
项目描述：该项目为广发信用卡大机核心优化升级项目，升级后的广发信用卡主机平台为业内最先进的系统，被称为信用卡中心的“最强心脏”。

专业技能
前端：React、Vue、TypeScript、HTML5、CSS3
后端：Node.js、Python、Java、MySQL、Redis
工具：Git、Docker、Jenkins、Webpack`;

        console.log('🔍 开始验证增强版简历导入功能...');
        
        try {
            // 解析测试简历
            const result = importUtils.parseTextContent(testResume);
            
            // 显示结果
            const resultsDiv = document.getElementById('results');
            
            // 个人信息验证
            resultsDiv.innerHTML += '<h3 class="success">✅ 解析成功！</h3>';
            
            resultsDiv.innerHTML += '<h4>👤 个人信息:</h4>';
            if (result.profile.name) {
                resultsDiv.innerHTML += `<p>姓名: ${result.profile.name}</p>`;
            }
            if (result.profile.phone) {
                resultsDiv.innerHTML += `<p>电话: ${result.profile.phone}</p>`;
            }
            if (result.profile.email) {
                resultsDiv.innerHTML += `<p>邮箱: ${result.profile.email}</p>`;
            }
            
            // 工作经历验证
            resultsDiv.innerHTML += '<h4>💼 工作经历:</h4>';
            if (result.experience && result.experience.length > 0) {
                result.experience.forEach((exp, i) => {
                    resultsDiv.innerHTML += `<p>${i+1}. ${exp.company || '公司'} - ${exp.position || '职位'}</p>`;
                });
            } else {
                resultsDiv.innerHTML += '<p class="error">未识别到工作经历</p>';
            }
            
            // 技能验证
            resultsDiv.innerHTML += '<h4>🛠️ 专业技能:</h4>';
            if (result.skills && result.skills.length > 0) {
                resultsDiv.innerHTML += `<p>${result.skills.slice(0, 10).join(', ')}</p>`;
            } else {
                resultsDiv.innerHTML += '<p class="error">未识别到技能</p>';
            }
            
            // 统计信息
            resultsDiv.innerHTML += '<h4>📈 统计信息:</h4>';
            resultsDiv.innerHTML += `<p>个人信息字段: ${Object.keys(result.profile).filter(k => result.profile[k]).length}</p>`;
            resultsDiv.innerHTML += `<p>工作经历数量: ${result.experience.length}</p>`;
            resultsDiv.innerHTML += `<p>技能数量: ${result.skills.length}</p>`;
            
            console.log('✅ 验证完成:', result);
            
        } catch (error) {
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = `<h3 class="error">❌ 验证失败</h3>`;
            resultsDiv.innerHTML += `<p>错误信息: ${error.message}</p>`;
            console.error('❌ 验证失败:', error);
        }
    </script>
</body>
</html>
