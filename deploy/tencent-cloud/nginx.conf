limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/m;

# Security headers map for reuse across location blocks
# Each location block that defines add_header must redeclare them all
# (nginx does NOT inherit add_header from parent when child has its own)

server {
    listen 80;
    server_name weihub.cloud www.weihub.cloud;
    
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name weihub.cloud www.weihub.cloud;

    ssl_certificate /etc/nginx/ssl/weihub.cloud.pem;
    ssl_certificate_key /etc/nginx/ssl/weihub.cloud.key;
    
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    root /var/www/ai-tool-hub/dist;
    index index.html;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/rss+xml application/atom+xml image/svg+xml;

    # --------------------------------------------------
    # Server-level security headers (fallback for requests
    # that don't match a location block with add_header).
    # Once a child location block declares ANY add_header,
    # these are NOT inherited — each block must repeat them.
    # --------------------------------------------------
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # --------------------------------------------------
    # Static assets — long-lived cache + security headers
    # NOTE: add_header here resets ALL server-level add_header,
    #       so we must redeclare every security header we need.
    # --------------------------------------------------
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        access_log off;
    }

    # --------------------------------------------------
    # API proxy — rate-limited, must also send security headers
    # --------------------------------------------------
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    }

    # --------------------------------------------------
    # SPA catch-all — serves index.html, must send security headers
    # --------------------------------------------------
    location / {
        try_files $uri $uri/ /index.html;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    }

    # --------------------------------------------------
    # Block source map access
    # --------------------------------------------------
    location ~* \.map$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # --------------------------------------------------
    # Deny access to dotfiles
    # --------------------------------------------------
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    access_log /var/log/nginx/ai-tool-hub-access.log;
    error_log /var/log/nginx/ai-tool-hub-error.log;
}
