gba(52, 211, 153, 0.15); transform: translateY(-1px); } /* ===== Main Layout ===== */ .main-content { padding-top: 56px; height: 100vh; position: relative; z-index: 1; } .split-layout { display: grid; grid-template-columns: 1fr 1fr; height: 100%; } /* ===== Left Editor Panel ===== */ .editor-panel { height: 100%; overflow-y: auto; border-right: 1px solid var(--border-subtle); background: var(--bg-secondary); position: relative; } .editor-panel::after { content: ''; position: absolute; top: 0; right: 0; bottom: 0; width: 1px; background: linear-gradient(180deg, var(--accent-purple), transparent 30%, transparent 70%, var(--accent-cyan)); opacity: 0.3; } .editor-header { padding: 20px 24px 0; display: flex; align-items: center; justify-content: space-between; } .editor-title { display: flex; align-items: center; gap: 10px; font-size: 16px; font-weight: 600; } .editor-title-icon { width: 24px; height: 24px; border-radius: 6px; background: rgba(139, 92, 246, 0.15); display: flex; align-items: center; justify-content: center; color: var(--accent-purple); font-size: 11px; } .editor-actions { display: flex; align-items: center; gap: 8px; } /* Template Dropdown */ .template-dropdown-wrap { position: relative; } .btn-template { display: flex; align-items: center; gap: 6px; padding: 6px 12px; font-size: 11px; font-weight: 500; color: var(--text-secondary); background: var(--bg-card); border: 1px solid var(--border-default); border-radius: 8px; cursor: pointer; transition: all 0.25s ease; } .btn-template:hover { border-color: var(--border-strong); color: var(--text-primary); background: var(--bg-elevated); } .btn-template i.fa-palette { color: #c084fc; } .template-dropdown-menu { position: absolute; right: 0; top: calc(100% + 4px); background: rgba(17, 17, 32, 0.95); backdrop-filter: blur(20px); border: 1px solid var(--border-default); border-radius: 10px; box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5), var(--glow-purple); min-width: 180px; padding: 4px; z-index: 50; } /* Version Ta  .ai-card-hint { font-size: 11px; color: var(--text-muted); margin-top: 8px; display: flex; align-items: center; gap: 4px; } /* ATS Panel */ .ai-card-ats { border-color: rgba(251, 146, 60, 0.2); } .ats-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; } .ats-header i { color: #fb923c; } .ats-header span { font-size: 13px; font-weight: 600; color: #fdba74; } .ats-desc { font-size: 11px; color: var(--text-muted); margin-bottom: 12px; } .ats-level-card { padding: 12px; background: var(--bg-primary); border: 1px solid rgba(251, 146, 60, 0.15); border-radius: 10px; cursor: pointer; transition: all 0.25s ease; } .ats-level-card:hover { border-color: rgba(251, 146, 60, 0.4); box-shadow: 0 0 16px rgba(251, 146, 60, 0.1); transform: translateY(-1px); } .ats-level-title { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; } .ats-level-title i { color: #fb923c; font-size: 12px; } .ats-level-title span { font-size: 12px; font-weight: 600; color: var(--text-primary); } .ats-level-desc { font-size: 11px; color: var(--text-muted); } /* JD Textarea */ .jd-textarea { width: 100%; background: var(--bg-primary); border: 1px solid var(--border-default); border-radius: 10px; padding: 12px; font-size: 12px; color: var(--text-primary); font-family: 'Inter', sans-serif; resize: none; transition: all 0.25s ease; line-height: 1.6; } .jd-textarea::placeholder { color: var(--text-muted); } .jd-textarea:focus { border-color: var(--accent-purple); box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.1); outline: none; } /* Optimize Button */ .btn-optimize { width: 100%; padding: 12px; font-size: 13px; font-weight: 600; color: white; background: linear-gradient(135deg, #7c3aed, #6366f1, #06b6d4); background-size: 200% 200%; border-radius: 10px; border: none; cursor: pointer; transition: all 0.3s ease; box-shadow: 0 0 20px rgba(139, 92, 246, 0.2); position: relative; overflow: hidden; } .btn-optimize::before { content: ''; position: absolute; top: 0; left: -100%; widt
