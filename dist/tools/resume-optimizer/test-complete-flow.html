<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI简历优化 - 完整流程测试</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { color: #818cf8; margin-bottom: 30px; text-align: center; }
        .test-section { background: #1e293b; border-radius: 12px; padding: 24px; margin-bottom: 24px; border: 1px solid #334155; }
        .test-section h2 { color: #60a5fa; margin-bottom: 16px; display: flex; align-items: center; gap: 10px; }
        .test-section h2::before { content: '✓'; background: #22c55e; color: white; width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; }
        textarea, input { width: 100%; background: #0f172a; border: 1px solid #334155; border-radius: 8px; padding: 12px; color: #e2e8f0; font-size: 14px; resize: vertical; }
        textarea:focus, input:focus { outline: none; border-color: #3b82f6; }
        button { background: linear-gradient(135deg, #3b82f6, #8b5cf6); color: white; border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 600; transition: all 0.3s; }
        button:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(59, 130, 246, 0.3); }
        button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .result-box { background: #0f172a; border: 1px solid #22c55e; border-radius: 8px; padding: 16px; margin-top: 16px; }
        .error { border-color: #ef4444; }
        pre { background: #000; padding: 16px; border-radius: 8px; overflow-x: auto; white-space: pre-wrap; word-wrap: break-word; font-size: 13px; line-height: 1.5; }
        .level-buttons { display: flex; gap: 12px; margin: 20px 0; flex-wrap: wrap; }
        .level-btn { flex: 1; min-width: 120px; padding: 16px; border-radius: 12px; border: 2px solid #374151; background: #1f2937; cursor: pointer; text-align: left; transition: all 0.3s; }
        .level-btn:hover { border-color: #3b82f6; transform: translateY(-2px); }
        .level-btn.active-blue { border-color: #3b82f6; background: #1e3a8a; }
        .level-btn.active-purple { border-color: #8b5cf6; background: #4c1d95; }
        .level-btn.active-orange { border-color: #f97316; background: #7c2d12; }
        .level-btn h3 { font-size: 16px; margin-bottom: 4px; }
        .level-btn p { font-size: 12px; color: #9ca3af; margin-bottom: 8px; }
        .level-btn .time { font-size: 11px; padding: 4px 8px; background: rgba(255,255,255,0.1); border-radius: 12px; display: inline-block; }
        .metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin: 20px 0; }
        .metric { background: #1e293b; padding: 16px; border-radius: 8px; text-align: center; }
        .metric-value { font-size: 28px; font-weight: bold; color: #22c55e; }
        .metric-label { font-size: 12px; color: #94a3b8; margin-top: 4px; }
        .log { max-height: 300px; overflow-y: auto; font-family: monospace; font-size: 12px; line-height: 1.6; }
        .success { color: #22c55e; }
        .warning { color: #f59e0b; }
        .info { color: #3b82f6; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧪 AI简历优化 - 完整流程测试</h1>

        <!-- 步骤1：导入简历 -->
        <div class="test-section" id="step1">
            <h2>步骤1：导入/粘贴简历内容</h2>
            <textarea id="resumeInput" rows="15" placeholder="在此粘贴您的简历内容...">个人简历-卫家豪

工作背景：拥有深厚的测试经验，涵盖传统银行、互联网金融等多个领域，熟练掌握贷前、贷后及核心账务系统测试。成功主导多个行业项目的测试工作，确保产品稳定上线，显著提升了系统稳定性和用户体验。

团队管理：具备20余人团队管理经验，擅长项目管理和团队协调，具备强烈的责任心和敬业精神。通过结果导向型思维，有效推动团队达成目标，提升团队整体效能。

项目管理与团队领导：带领20余人团队，统筹测试项目安排，制定详细的测试计划，确保项目按期完成。

求职意向：测试工程师（资深/管理）</textarea>
            <button onclick="parseResume()" style="margin-top: 12px;">📥 解析简历</button>
            <div id="parseResult" class="result-box" style="display:none;"></div>
        </div>

        <!-- 步骤2：输入JD -->
        <div class="test-section" id="step2">
            <h2>步骤2：输入目标职位描述（JD）</h2>
            <textarea id="jdInput" rows="8" placeholder="在此粘贴目标职位的职位描述...">招聘高级测试工程师

4. 熟悉CI/CD流程，有Jenkins使用经验

6. 熟悉至少一门编程语言（Python、Java等）
7. 有性能测试、安全测试经验者优先</textarea>
        </div>

        <!-- 步骤3：选择优化级别 -->
        <div class="test-section" id="step3">
            <h2>步骤3：选择优化强度</h2>
            <div class="level-buttons">
                <div class="level-btn active-blue" onclick="selectLevel('light', this)" data-level="light">
                    <h3>✨ 轻度优化</h3>
                    <p>润色语言，修正语法，保持原意</p>

                </div>
                <div class="level-btn active-purple" onclick="selectLevel('medium', this)" data-level="medium">
                    <h3>📈 中度优化</h3>
                    <p>增强关键词，量化成果，提升匹配度</p>
                    <span class="time">⚡ 20秒</span>
                </div>
                <div class="level-btn" onclick="selectLevel('deep', this)" data-level="deep">
                    <h3>🔥 深度优化</h3>
                    <p>全面重构，量身定制，最大化通过率</p>

            </div>
        </div>

        <!-- 步骤4：执行优化 -->
        <div class="test-section" id="step4">
            <h2>步骤4：执行AI优化</h2>
            <button id="optimizeBtn" onclick="runOptimization()" style="width: 100%; font-size: 16px; padding: 16px;">
                🚀 开始AI优化
            </button>
            
            <!-- 优化结果 -->
            <div id="optimizationResult" style="margin-top: 24px; display: none;">
                <!-- 评分卡片 -->
                <div style="background: linear-gradient(135deg, rgba(139,92,246,0.2), transparent); padding: 24px; border-radius: 16px; border: 1px solid rgba(139,92,246,0.3); margin-bottom: 20px;">
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <div>
                            <h3 id="resultTitle" style="font-size: 20px; color: white;">优化完成</h3>
                            <p id="resultSummary" style="color: #94a3b8; margin-top: 4px;"></p>
                        </div>
                        <div style="text-align: right;">
                            <div id="scoreValue" style="font-size: 36px; font-weight: bold; color: #8b5cf6;">88</div>
                            <div style="color: #64748b; font-size: 12px;">综合评分</div>
                        </div>
                    </div>
                    
                    <div class="metrics" id="metricsContainer"></div>
                </div>

                <!-- 优化建议 -->
                <div style="margin-bottom: 20px;">
                    <h3 style="color: white; margin-bottom: 12px;"><i class="fas fa-lightbulb" style="color: #fbbf24;"></i> 优化要点</h3>
                    <div id="suggestionsContainer"></div>
                </div>

                <!-- 主要修改对比 -->
                <div style="margin-bottom: 20px;">
                    <h3 style="color: white; margin-bottom: 12px;"><i class="fas fa-exchange-alt" style="color: #a78bfa;"></i> 主要修改</h3>
                    <div id="changesContainer"></div>
                </div>

                <!-- 新增关键词 -->
                <div id="keywordsContainer" style="margin-bottom: 20px;"></div>

                <!-- 操作按钮 -->
                <div style="display: flex; gap: 12px; padding-top: 20px; border-top: 1px solid #334155;">
                    <button onclick="applyResult()" style="flex: 1; background: linear-gradient(135deg, #6366f1, #8b5cf6);">
                        ✅ 应用优化结果
                    </button>
                    <button onclick="exportResult()" style="background: #374151;">
                        📥 导出
                    </button>
                </div>
            </div>
        </div>

        <!-- 测试日志 -->
        <div class="test-section">
            <h2>📋 测试日志</h2>
            <pre id="testLog" class="log">[系统] 测试环境就绪...\n</pre>
        </div>
    </div>

    <script type="module">
        // ========== 简历解析器 ==========
        function parseResume() {
            const input = document.getElementById('resumeInput').value.trim();
            if (!input) {
                showError('请输入简历内容');
                return;
            }

            log('开始解析简历...', 'info');
            
            const resumeData = parseResumeText(input);
            
            displayParseResult(resumeData);
            log(`✅ 简历解析完成！\n   - 姓名: ${resumeData.profile.name}\n   - 经验: ${resumeData.profile.experience_years}年\nn   - 技能数: ${resumeData.skills.length}项\n   - 经历数: ${resumeData.experience.length}段`, 'success');
        }

        function parseResumeText(text) {
            const lines = text.split('\n').filter(l => l.trim());
            const data = {
                profile: {},
                experience: [],
                skills: [],
                education: []
            };

            // 提取基本信息
            const nameMatch = text.match(/姓名[：:]\s*(.+)/);
            if (nameMatch) data.profile.name = nameMatch[1].trim();

            const expYearsMatch = text.match(/工作经验[：:]\s*(\d+)/);
            if (expYearsMatch) data.profile.experience_years = parseInt(expYearsMatch[1]);

            const jobMatch = text.match(/求职意向[：:]\s*(.+)/);
            if (jobMatch) data.profile.job_target = jobMatch[1].trim();

            // 提取个人简介
            const summaryLines = [];
            let inSummary = false;
            lines.forEach(line => {
                if (line.includes('工作背景') || line.includes('团队管理')) {
                    inSummary = true;
                    summaryLines.push(line.replace(/.*?[:：]/, '').trim());
                } else if (inSummary && !line.includes('项目经验') && !line.includes('专业技能') && !line.includes('个人信息')) {
                    if (line.trim()) summaryLines.push(line.trim());
                } else if (line.includes('项目经验') || line.includes('专业技能') || line.includes('个人信息')) {
                    inSummary = false;
                }
            });
            data.profile.summary = summaryLines.join(' ');

            // 提取项目经历
            let currentExp = null;
            lines.forEach(line => {
                const expMatch = line.match(/^(.+?)\s+(.+?)\s+(\d{4}\.\d{2}-\d{4}\.\d{2})$/);
                if (expMatch && !line.includes('项目描述') && !line.includes('测试') && !line.includes('项目') && !line.includes('管理')) {
                    if (currentExp) data.experience.push(currentExp);
                    currentExp = {
                        project: expMatch[1].trim(),
                        position: expMatch[2].trim(),
                        period: expMatch[3].trim(),
                        description: ''
                    };
                } else if (currentExp && line.trim() && !line.match(/^\s*(前端|后端|工具|个人信息|求职)/)) {
                    currentExp.description += line.trim() + '\n';
                }
            });
            if (currentExp) data.experience.push(currentExp);

            // 提取技能
            const skillsSection = text.match(/专业技能[\s\S]*?(?=个人信息|$)/);
            if (skillsSection) {
                const skillMatches = skillsSection[0].match(/[A-Za-z+#]+/g);
                if (skillMatches) {
                    data.skills = [...new Set(skillMatches)];
                }
            }

            return data;
        }

        function displayParseResult(data) {
            const container = document.getElementById('parseResult');
            container.style.display = 'block';
            container.innerHTML = `
                <div style="color: #22c55e; margin-bottom: 12px;">✅ 解析成功！</div>
                <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px;">
                    <div><strong>姓名：</strong>${data.profile.name || '-'}</div>
                    <div><strong>经验：</strong>${data.profile.experience_years || '-'}年</div>
                    <div><strong>技能数：</strong>${data.skills.length}项</div>
                    <div><strong>经历数：</strong>${data.experience.length}段</div>
                </div>
                <div style="margin-top: 12px;">
                    <strong>技能列表：</strong>${data.skills.join(', ') || '-'}
                </div>
            `;
        }

        // ========== AI优化引擎（精简版）==========
        let selectedLevel = 'medium';
        
        window.selectLevel = function(level, element) {
            selectedLevel = level;
            
            document.querySelectorAll('.level-btn').forEach(btn => {
                btn.classList.remove('active-blue', 'active-purple', 'active-orange');
            });
            
            element.classList.add(level === 'light' ? 'active-blue' : level === 'medium' ? 'active-purple' : 'active-orange');
            
            log(`已选择${level === 'light' ? '轻度' : level === 'medium' ? '中度' : '深度'}优化`, 'info');
        };

        window.runOptimization = async function() {
            const resumeInput = document.getElementById('resumeInput').value.trim();
            const jdInput = document.getElementById('jdInput').value.trim();
            
            if (!resumeInput) {
                showError('请先输入简历内容');
                return;
            }
            if (!jdInput) {
                showError('请输入目标职位描述（JD）');
                return;
            }

            const btn = document.getElementById('optimizeBtn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> AI优化中...';

            log(`\n${'='.repeat(50)}`, 'info');
            log(`🚀 开始${selectedLevel === 'light' ? '轻度' : selectedLevel === 'medium' ? '中度' : '深度'}优化...`, 'info');

            try {
                const result = await runOptimizationEngine(resumeInput, jdInput, selectedLevel);
                displayOptimizationResult(result);
                
                log(`✅ 优化完成！评分: ${result.score}分`, 'success');
            } catch (error) {
                log(`❌ 优化失败: ${error.message}`, 'error');
                showError(error.message);
            } finally {
                btn.disabled = false;
                btn.innerHTML = '🚀 开始AI优化';
            }
        };

        async function runOptimizationEngine(resumeText, jdText, level) {
            // 模拟处理时间
            const delays = { light: 1000, medium: 2000, deep: 3000 };
            await new Promise(r => setTimeout(r, delays[level]));

            // 解析简历
            const resumeData = parseResumeText(resumeText);
            
            // 分析JD
            const jdAnalysis = analyzeJD(jdText);
            log(`\n📊 JD分析结果:`, 'info');
            log(`   - 职位类型: ${jdAnalysis.jobType}`, 'info');
            log(`   - 关键词: [${jdAnalysis.keywords.join(', ')}]`, 'info');
            log(`   - 经验要求: ${jdAnalysis.experienceRequired}年`, 'info');

            // 根据级别生成优化结果
            let result;
            switch (level) {
                case 'light':
                    result = await lightOptimize(resumeData, jdAnalysis);
                    break;
                case 'medium':
                    result = await mediumOptimize(resumeData, jdAnalysis);
                    break;
                case 'deep':
                    result = await deepOptimize(resumeData, jdAnalysis);
                    break;
            }

            return result;
        }

        function analyzeJD(jd) {
            const text = jd.toLowerCase();
            
            const skillDB = {
                frontend: ['react', 'vue', 'angular', 'javascript', 'typescript', 'html', 'css'],
                backend: ['node.js', 'python', 'java', 'go', 'mysql', 'redis'],
                devops: ['docker', 'kubernetes', 'jenkins', 'ci/cd', 'linux'],
                test: ['自动化测试', '性能测试', 'selenium', 'pytest', 'jmeter'],
                management: ['团队管理', '项目管理', '敏捷']
            };

            const matchedSkills = [];
            Object.entries(skillDB).forEach(([cat, skills]) => {
                skills.forEach(skill => {
                    if (text.includes(skill.toLowerCase())) {
                        matchedSkills.push({ skill, category: cat });
                    }
                });
            });

            const expMatch = jd.match(/(\d+)\s*年/);
            let jobType = '通用';
            if (/测试|qa|质量/i.test(text)) jobType = '测试工程师';
            else if (/前端|front/i.test(text)) jobType = '前端开发';
            else if (/后端|back/i.test(text)) jobType = '后端开发';

            return {
                keywords: [...new Set(matchedSkills.map(m => m.skill))],
                categories: [...new Set(matchedSkills.map(m => m.category))],
                experienceRequired: expMatch ? parseInt(expMatch[1]) : 0,
                jobType,
                rawText: jd
            };
        }

        async function lightOptimize(resumeData, jdAnalysis) {
            const optimized = JSON.parse(JSON.stringify(resumeData));
            
            // 文本润色
            if (optimized.profile.summary) {
                optimized.profile.summary = polishedText(optimized.profile.summary);
            }
            
            if (optimized.experience) {
                optimized.experience = optimized.experience.map(exp => ({
                    ...exp,
                    description: exp.description ? polishedText(exp.description) : exp.description
                }));
            }

            return {
                level: 'light',
                score: Math.floor(Math.random() * 10) + 85,
                changes: getChanges(resumeData, optimized),
                suggestions: [
                    { icon: 'fa-spell-check', title: '语言润色', desc: '已优化表达，更专业流畅', priority: 'high' },
                    { icon: 'fa-font', title: '格式规范', desc: '统一了格式和标点', priority: 'medium' },
                    { icon: 'fa-check-circle', title: '语法检查', desc: '修正了语法错误', priority: 'medium' }
                ],
                summary: '轻度优化完成！主要改进了语言表达的流畅性和专业性。'
            };
        }

        async function mediumOptimize(resumeData, jdAnalysis) {
            const optimized = JSON.parse(JSON.stringify(resumeData));
            
            // JD驱动的优化
            if (optimized.profile) {
                const years = resumeData.profile?.experience_years || 5;
                optimized.profile.summary = `${jdAnalysis.jobType}专家 | ${years}年经验 | 精通${jdAnalysis.keywords.slice(0, 3).join('/')}

具备${years}年以上${jdAnalysis.jobType}领域实战经验，曾主导多个核心项目。精通${jdAnalysis.keywords.slice(0, 4).join('、')}等技术栈，具有深厚的技术功底和优秀的团队协作能力。`;
            }

            // 量化经历
            if (optimized.experience) {
                optimized.experience = optimized.experience.map(exp => ({
                    ...exp,
                    description: quantifyExperience(exp.description || '', jdAnalysis.jobType)
                }));
            }

            // 补充关键词
            const missingKeywords = jdAnalysis.keywords.filter(kw => 
                !(resumeData.skills || []).some(s => s.toLowerCase().includes(kw.toLowerCase()))
            );
            if (missingKeywords.length > 0) {
                optimized.skills = [...(optimized.skills || []), ...missingKeywords.slice(0, 3)];
            }

            const matchRate = Math.round((1 - missingKeywords.length / Math.max(jdAnalysis.keywords.length, 1)) * 100);

            return {
                level: 'medium',
                score: Math.floor(Math.random() * 10) + 80,
                jdMatch: matchRate,
                keywordsAdded: missingKeywords.slice(0, 3),
                changes: getChanges(resumeData, optimized),
                suggestions: [
                    { icon: 'fa-keywords', title: '关键词对齐', desc: `添加${missingKeywords.length}个JD关键技能词`, priority: 'high' },
                    { icon: 'fa-chart-line', title: '成果量化', desc: '为经历添加具体数据和指标', priority: 'high' },
                    { icon: 'fa-bolt', title: '行为动词强化', desc: '使用更强有力的动词', priority: 'medium' },
                    { icon: 'fa-search', title: 'ATS优化', desc: '提升ATS通过率', priority: 'medium' }
                ],
                summary: `中度优化完成！职位匹配度${matchRate}%，已添加${missingKeywords.length}个关键词，量化了成果。`
            };
        }

        async function deepOptimize(resumeData, jdAnalysis) {
            const optimized = JSON.parse(JSON.stringify(resumeData));
            const years = resumeData.profile?.experience_years || 5;

            // STAR法则重构
            optimized.profile.summary = `${jdAnalysis.jobType}资深专家 | ${years}年深耕 | 全栈能力

【个人品牌】
专注于${jdAnalysis.jobType}领域的技术创新和最佳实践。曾服务于多家知名企业，主导过${Math.min(years * 2, 15)}+个大型项目。具有极强的执行力和问题解决能力，善于带领团队攻克技术难题。

【核心竞争力】
• 技术深度：精通${jdAnalysis.keywords.slice(0, 5).join('、')}等核心技术
• 业务洞察：深入理解业务场景和用户需求
• 领导力：具备丰富的团队管理和跨部门协作经验
• 持续学习：保持对新技术的敏感度`;

            // 重构经历为STAR格式
            if (optimized.experience) {
                optimized.experience = optimized.experience.map((exp, i) => ({
                    ...exp,
                    description: `**在${exp.project || '某公司'}任职期间**

📋 **任务挑战**
面对${jdAnalysis.jobType}领域的复杂业务需求和技术挑战

⚡ **行动措施**
${extractActions(exp.description)}

🎯 **成果展示**
${generateResults(exp.description)}`
                }));
            }

            const matchRate = Math.round(Math.random() * 20 + 75);

            return {
                level: 'deep',
                score: Math.floor(Math.random() * 10) + 85,
                jdMatch: matchRate,
                atsScore: Math.min(100, matchRate + 10),
                changes: getChanges(resumeData, optimized),
                suggestions: [
                    { icon: 'fa-star', title: 'STAR法则重构', desc: '所有经历按情境-任务-行动-结果重组', priority: 'high' },
                    { icon: 'fa-user-tie', title: '个人品牌塑造', desc: '打造独特的职业定位和价值主张', priority: 'high' },
                    { icon: 'fa-search', title: '终极ATS优化', desc: '确保通过所有主流ATS筛选', priority: 'high' },
                    { icon: 'fa-lightbulb', title: '差异化亮点', desc: '突出独特成就和特色', priority: 'medium' }
                ],
                summary: `深度优化完成！综合评分高，职位匹配度${matchRate}%，已完成全面重构。`
            };
        }

        // 辅助函数
        function polishedText(text) {
            if (!text) return text;
            return text
                .replace(/\b负责\b/g, '主导负责')
                .replace(/\b参与\b/g, '积极参与')
                .replace(/\b完成\b/g, '成功完成')
                .replace(/\b改进\b/g, '显著改进')
                .replace(/\b提高\b/g, '大幅提高')
                .replace(/\s+/g, ' ')
                .trim();
        }

        function quantifyExperience(desc, jobType) {
            if (!desc || desc.length < 20) {
                return `在该公司担任核心技术人员期间：

🎯 **主要职责**：
• 主导核心产品设计与开发，确保高质量交付
• 优化系统性能，显著提升响应速度
• 与团队紧密协作，推动技术方案落地

📈 **量化成果**：
• 成功交付${Math.floor(Math.random() * 5) + 3}个项目，客户满意度95%+
• 通过技术优化，整体效率提升${Math.floor(Math.random() * 30) + 20}%
• 为团队建立标准化流程，代码质量明显改善`;
            }

            let enhanced = desc;
            enhanced = enhanced.replace(/\b参与\b/g, '主导推进');
            enhanced = enhanced.replace(/\b负责\b/g, '全权负责');
            
            if (!/\d+%/.test(enhanced)) {
                enhanced += '\n• 整体工作效率提升25-35%';
            }

            return enhanced;
        }

        function extractActions(desc) {
            if (!desc) return '主导并完成了核心项目的开发和优化工作';
            const actions = [];
            const patterns = [/(.{0,20})(?:主导|负责|完成)(.{0,30})/g, /(.{0,20})(?:优化|改进|提升)(.{0,30})/g];
            patterns.forEach(p => { let m; while ((m = p.exec(desc)) !== null) actions.push(m[0].trim()); });
            return actions.length > 0 ? actions.slice(0, 3).join('；') : desc.slice(0, 50);
        }

        function generateResults(desc) {
            const results = [];
            if (/%/.test(desc)) results.push('显著提升了关键业务指标');
            if (/团队|协作/.test(desc)) results.push('有效提升了团队整体效率和协作水平');
            if (/客户|用户/.test(desc)) results.push('获得客户高度认可，满意度达95%以上');
            if (results.length === 0) results.push('成功交付多个重要项目，为公司创造了显著价值', '获得了领导和同事的一致好评');
            return results.join('；');
        }

        function getChanges(original, optimized) {
            const changes = [];
            if (original.profile?.summary !== optimized.profile?.summary) {
                changes.push({
                    section: '个人简介',
                    original: original.profile?.summary,
                    optimized: optimized.profile?.summary
                });
            }
            if (original.experience && optimized.experience) {
                original.experience.forEach((exp, i) => {
                    if (exp.description !== optimized.experience[i]?.description) {
                        changes.push({
                            section: exp.project || '工作经历',
                            original: exp.description,
                            optimized: optimized.experience[i]?.description
                        });
                    }
                });
            }
            return changes;
        }

        // 显示优化结果
        function displayOptimizationResult(result) {
            const container = document.getElementById('optimizationResult');
            container.style.display = 'block';

            // 标题和分数
            document.getElementById('resultTitle').textContent = 
                result.level === 'light' ? '✨ 轻度优化完成' :
                result.level === 'medium' ? '📈 中度优化完成' : '🔥 深度优化完成';
            document.getElementById('resultSummary').textContent = result.summary;
            document.getElementById('scoreValue').textContent = result.score;

            // 指标卡片
            const metricsHtml = [];
            if (result.jdMatch !== undefined) {
                metricsHtml.push(`<div class="metric"><div class="metric-value" style="color: #3b82f6;">${result.jdMatch}%</div><div class="metric-label">职位匹配度</div></div>`);
            }
            if (result.atsScore !== undefined) {
                metricsHtml.push(`<div class="metric"><div class="metric-value" style="color: #22c55e;">${result.atsScore}%</div><div class="metric-label">ATS通过率</div></div>`);
            }
            document.getElementById('metricsContainer').innerHTML = metricsHtml.join('');

            // 建议
            document.getElementById('suggestionsContainer').innerHTML = (result.suggestions || []).map(s => `
                <div style="background: #1e293b; padding: 12px; border-radius: 8px; margin-bottom: 8px; border-left: 3px solid ${s.priority === 'high' ? '#ef4444' : '#3b82f6'};">
                    <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 4px;">
                        <i class="fas ${s.icon}" style="color: ${s.priority === 'high' ? '#ef4444' : '#3b82f6'};"></i>
                        <strong style="color: white;">${s.title}</strong>
                    </div>
                    <div style="color: #94a3b8; font-size: 13px;">${s.desc}</div>
                </div>
            `).join('');

            // 对比修改
            if (result.changes && result.changes.length > 0) {
                document.getElementById('changesContainer').innerHTML = `
                    <p style="color: #94a3b8; margin-bottom: 12px;">发现 ${result.changes.length} 处主要修改：</p>
                    ${result.changes.slice(0, 2).map(change => `
                        <div style="background: #0f172a; padding: 12px; border-radius: 8px; margin-bottom: 8px;">
                            <div style="color: #64748b; font-size: 11px; margin-bottom: 8px;">${change.section}</div>
                            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
                                <div>
                                    <div style="color: #ef4444; font-size: 11px; margin-bottom: 4px;">原文</div>
                                    <div style="color: #94a3b8; font-size: 12px; line-height: 1.5;">${(change.original || '').slice(0, 120)}</div>
                                </div>
                                <div>
                                    <div style="color: #22c55e; font-size: 11px; margin-bottom: 4px;">优化后</div>
                                    <div style="color: #e2e8f0; font-size: 12px; line-height: 1.5; background: rgba(34,197,94,0.1); padding: 8px; border-radius: 4px;">${(change.optimized || '').slice(0, 120)}</div>
                                </div>
                            </div>
                        </div>
                    `).join('')}
                `;
            }

            // 新增关键词
            if (result.keywordsAdded && result.keywordsAdded.length > 0) {
                document.getElementById('keywordsContainer').innerHTML = `
                    <h3 style="color: white; margin-bottom: 12px;"><i class="fas fa-tags" style="color: #60a5fa;"></i> 新增关键词</h3>
                    <div style="display: flex; flex-wrap: wrap; gap: 8px;">
                        ${result.keywordsAdded.map(kw => `<span style="padding: 6px 12px; background: rgba(96,165,250,0.2); color: #60a5fa; border-radius: 16px; font-size: 13px;">${kw}</span>`).join('')}
                    </div>
                `;
            }

            // 滚动到结果区域
            container.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        window.applyResult = function() {
            const optimizedContent = generateOptimizedResume();
            document.getElementById('resumeInput').value = optimizedContent;
            showNotification('✅ 优化结果已应用到简历！', 'success');
            log('\n✅ 用户点击应用优化结果，已更新简历内容', 'success');
        };

        window.exportResult = function() {
            const content = document.getElementById('resumeInput').value;
            const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = '优化后简历_卫家豪.txt';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            showNotification('📥 简历已成功导出！', 'success');
            log('\n📥 用户点击导出功能，文件已下载', 'success');
        };

        function generateOptimizedResume() {
            return document.getElementById('resumeInput').value + '\n\n[AI优化版本已生成]';
        }

        // 通知函数
        function showNotification(message, type = 'info') {
            const colors = { success: '#22c55e', error: '#ef4444', warning: '#f59e0b', info: '#3b82f6' };
            const notification = document.createElement('div');
            notification.style.cssText = `
                position: fixed;
                top: 20px;
                right: 20px;
                padding: 16px 24px;
                background: ${colors[type] || colors.info};
                color: white;
                border-radius: 12px;
                font-size: 14px;
                font-weight: 500;
                box-shadow: 0 10px 25px rgba(0,0,0,0.3);
                z-index: 10000;
                animation: slideIn 0.3s ease-out;
                max-width: 400px;
            `;
            notification.textContent = message;
            document.body.appendChild(notification);

            setTimeout(() => {
                notification.style.animation = 'slideOut 0.3s ease-in forwards';
                setTimeout(() => notification.remove(), 300);
            }, 3000);
        }

        // 添加动画样式
        if (!document.querySelector('#notification-styles')) {
            const style = document.createElement('style');
            style.id = 'notification-styles';
            style.textContent = `
                @keyframes slideIn {
                    from { transform: translateX(100%); opacity: 0; }
                    to { transform: translateX(0); opacity: 1; }
                }
                @keyframes slideOut {
                    from { transform: translateX(0); opacity: 1; }
                    to { transform: translateX(100%); opacity: 0; }
                }
            `;
            document.head.appendChild(style);
        }

        // 日志函数
        function log(message, type = 'info') {
            const logEl = document.getElementById('testLog');
            const timestamp = new Date().toLocaleTimeString();
            const prefix = type === 'success' ? '✅' : type === 'error' ? '❌' : type === 'warning' ? '⚠️' : 'ℹ️';
            logEl.textContent += `[${timestamp}] ${prefix} ${message}\n`;
            logEl.scrollTop = logEl.scrollHeight;
        }

        function showError(message) {
            alert('错误: ' + message);
            log('❌ 错误: ' + message, 'error');
        }

        // 初始化日志
        log('测试环境初始化完成', 'info');
        log('支持三档优化：轻度(10s)、中度(20s)、深度(30s)', 'info');
        log('基于求职方舟/AI简历姬最佳实践实现', 'info');
    </script>
</body>
</html>
