version: '3.8'

services:
  api:
    build: .
    ports:
      - "3000:3000"
    environment:
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET must be set in .env}
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost:3000}
      - DAILY_QUOTA=${DAILY_QUOTA:-10}
      - PORT=3000
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3